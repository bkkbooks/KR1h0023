body:
  text: 欽定四庫全書經部八蒙齋中庸講義四書類提要臣等謹案蒙齋中庸講義四卷宋袁甫撰甫字廣微鄞縣人寶文閣直學士爕之子嘉定七年進士官至吏部侍郎兼國子祭酒權兵部尚書諡正肅事迹具宋史本傳史稱所著有孟子解今未見傳本殆已亡佚此書散見永樂大典中而史志顧未之及惟朱彛尊經義考有甫所撰中庸詳説二卷注云已佚或即是書之别名歟其書備列經文逐節訓解蓋平日録以授門弟子者中閒委曲推闡往往言之不足而重言以申之其學出於楊簡簡之學則出於陸九淵故立説多與九淵相合如講語大語小一節云包羅天地該括事物天下不能載者惟君子能載之而天下又何以載幽通鬼神微入毫髪天下不能破者惟君子能破之而天下又何以破此即象山語録所云天下莫能載者道大無外若能載則有分限矣天下莫能破者一事一物纎悉微末未嘗與道相離之説也其講自誠明一節云誠不可傳可傳者明明即性也不在誠外也此即象山語録所云誠則明明則誠此非有次第其理自如此之説也其他宗㫖大都不出於此雖主持過當或不免惝怳無歸要其心得之處未嘗不自成一家謹依經排輯釐為四巻以存金谿之學派至其甚謬於理者則於書中别加案語考正其誤以杜狂禪恣肆之漸焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
