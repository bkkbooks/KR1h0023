body:
  text: 欽定四庫全書䝉齋中庸講義卷一宋袁甫撰中庸堯舜禹相授受曰中中者何非動静而動靜函非剛柔而剛柔具渾焉不可名狀而又未嘗不可名狀是之謂中一中之外秋毫不容加也夫苟曰秋毫不容加今子思名其書曰中而繼以庸何哉庸常也常中也上天下地萬象昭布往古來今萬變參錯所謂中者只如此而已是之謂常中然則繼之曰庸實未嘗加一秋毫也雖未嘗加一秋毫然中字得庸字而愈明何也太極未分包括隂陽分隂分陽太極在中一而萬萬而一故是書之作或獨言中或獨言庸或並言中庸獨言中而庸未嘗不在也獨言庸而中未甞不在也並言中庸而無所不在也嘗斷之曰不差之謂中不異之謂庸端端的的何差之有日用普平何異之有不差故名曰中不異故名曰庸中庸言其常不差也道統之傳尚矣孔子傳之曾子曾子傳之子思子思傳之孟子曰忠恕曰中庸曰仁義参天地配隂陽發性命之藴會事物之極筆之於書以詔天下來世使之因彝訓識指歸聖賢相傳之道統所以到於今不泯也葢自堯舜禹之相授受不過曰中而己何謂中非動靜而動静函非剛柔而剛柔具本無中之名不得已而名立焉一中之外秋毫莫加夫苟不可加秋毫也今此書言中而繼以庸何哉庸常也常不在中之外也中在是而常已在是雖繼之以庸而實未嘗加一秋毫也學者知中與庸俱名與實同則堯舜禹約以一辭而非少也又知繼之以庸無所加益則子思子並明二義而非多也易有太極是生兩儀兩儀生四象四象生八卦太極之中固自有兩儀四象八卦之理存焉兩儀四象八卦又曷嘗有外於太極哉中者先天地而存即太極也而其充滿乎宇宙之間日用常行秩然粲然而不違乎自然之彝倫者庸也而無非中也一中之外豈有秋毫之可加耶故中庸之書或獨言中或獨言庸或並言中庸獨言中而庸未嘗不在也獨言庸而中未嘗不在也並言中庸而無所不在也其實一而已矣忠恕猶是也仁義猶是也吾夫子嘗言忠矣嘗言恕矣及告曽子以一貫而曽子心領神㑹出告門人曰忠恕而已矣視吾夫子之言未嘗加一秋毫也夫子嘗言仁矣嘗言義矣孟子得吾夫子之傳最爲端的是以七篇之書首曰仁義而已矣視吾夫子之言亦未嘗加一秋毫也斯道也無罅之可指無間之可容不識不知而順帝則從心所欲而不踰矩則者何非中庸乎矩者何非中庸乎曰矩曰則加一秋毫固不可也捐一秋毫可乎有加有損則爲有餘不足不可加不可損是中庸也亦忠恕也亦仁義也斯其爲孔子曽子子思孟子相傳之道統乎自孟子没世儒非無得其髣髴者然此道寖失其傳至我朝伊洛之學興實源流於洙泗而其發揮之功亦不細矣中興以後儒宗繼出以明道爲已任其大端大㫖可以㮣見而習其學者未明師傳易生流弊固滯紙上之言説依倣前人之近似某竊深病之嘗謂儒者之患慕上逹者每欲超乎形器之表務下學者未深造乎一貫之妙道之不明實基於此噫焉有真知中庸之味者乎孰逺孰近非無逺近逺之近也孰㣲孰顯非無㣲顯㣲之顯也孰髙孰下非無髙下上下察也孰洪孰纎非無洪纎語小大也孰爲人己即人即己成己成物也孰爲天地即天即地參乎天地也是故中庸一書涵宏大而析物微切極奥妙而指事平近行乎彝倫者皆皜皜之妙塞乎宇宙者即肫肫之誠學者於是而省察焉勿忘勿助弗得弗措則於孔子曽子子思孟子相傳之道統其庶矣乎某不敏敢誦所聞而與學子共之天命之謂性率性之謂道修道之謂教道也者不可須臾離也可離非道也是故君子戒慎乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨也喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也致中和天地位焉萬物育焉中庸一書窮理盡性至命之書也子思揭諸篇首曰天命之謂性性不離命命不離性性命不離中庸知中庸則知性命矣知性命則知中庸矣載稽聖經語命而性存焉語性而命存焉舜言敕天之命湯言上帝降𠂻若有恒性制命自天而敕命在我若性在我而降衷自天格言大訓流傳以至春秋劉子曰民受天地之中以生所謂命也夫苟曰受中則謂之性宜也而乃謂之命何哉命即性也合而言之一也至於孟子之言性命則亦曰形色天性也又曰知其性則知天矣是故指耳目鼻口四肢之於色聲臭味安佚而曰性也又繼之曰有命焉葢謂天命一定凡所謂貴賤貧富生死壽夭莫不各有定分而色聲臭味安佚雖人之所同欲然有得焉有不得焉非命然耶苟制於命矣則不專於性也性不可離命而言也指仁義禮智天道之於父子君臣賔主賢者聖人而曰命也又繼之曰有性焉葢謂天性在我則仁者必壽大德者必受命而所謂仁義禮智天道乃吾性之所固有耳既謂之性則不專於命也命不可離性而言也孟子所以反覆言此者誠以性不離命則當聼其在天命不離性則當盡其在我聼其在天者即我也盡其在我者即天也堯曰咨爾舜天之厯數在爾躬允執其中中豈在厯數之外哉在爾躬者豈非即其在天者哉若曰惟聖人能然而常人不能然獨不思人人皆有天命之性天與我同一太極也元命自我作哲命自我貽天命自我度天固在我也豈蒼蒼者爲天耶此性命之道也此中庸之道也此窮理盡性以至於命也皆人所固有也皆人所可爲也率性之謂道率循也循性而行即中庸之道也人皆有此性則皆有此道道不在性之外也父子君臣夫婦長㓜朋友五典皆道也而即仁義禮智信五常之性也此性此道不慮而知不學而能在我率而行之耳有所矯拂則不可以言率性委諸自然則亦不可以言率性不起穿鑿之意見不生支離之言論必有事焉而行所無事是之謂率性此性此道無二致也道之爲言通也繫辭曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義陰陽剛柔仁義之道即性命也世之不明道者語道則離於性語性則離於命殊不知所謂道者斷斷乎合天地人斷斷乎通性與命是之謂道是之謂無所不通荀揚韓不知道故不識性或以爲性惡或以爲善惡混或以爲三品何其紛紛乎異説耶且夫人之禀賦固有剛柔緩急輕重清濁之異矣然而一性之靈則舉天下相似也今夫疆忍之人不可以禮義誨也一見赤子匍匐入井則未嘗不惻然憐之至於乞食之人雖瀕於死而簞食豆羮蹴爾而與則必有所不屑也此果何自而發耶非夫性天之同然者不可磨滅耶孔子曰性相近近之一字固已包剛柔緩急輕重清濁在其中矣彼聖愚賢不肖若甚相逺也今乃斷斷然謂之近葢謂厥初生民本無相逺人人可以爲聖爲賢其所以發明本有之靈而使天下萬世不敢自暴自棄者皆此一近字之功也孟子深得斯㫖故曰性善善之一字即書之所謂降衷傳之所謂受中者是也書傳孟子豈不知剛柔緩急輕重清濁之分哉而止曰中曰善者亦自其大致言之耳雖止言大致而未嘗不精宻也故書言降衷必曰克綏厥猷傳言受中必曰動作禮義威儀之則孟子言性善必曰養性正以天人一貫是之謂道即中庸率性之㫖也道何待修修之名生於壞道元無壞何以修爲曰道終古常存然差之毫釐謬以千里何可一日不修身不能無不善故曰修身德不能日日新故曰修德所謂修者非有所加益也修而明之使無昏修而全之使無虧還其本有者而已此古人所以兢兢業業孳孳勉勉如天之行健而自强不息者葢將明此道之教以教天下之爲人臣為人子爲人弟爲人婦者必忠必孝必弟必順也教天下之爲人君爲人父爲人兄爲人夫者必仁必慈必友必義也是教也非獨行乎庠序學校者謂之教凡施於宗廟朝廷射御燕饗朝見聘問冠昏䘮祭者皆教也非獨載在方冊見於誦習者謂之教凡簠簋籩豆升降上下周旋裼襲之儀鐘鼔筦磬綴兆行列屈伸俯仰之節皆教也禮樂之有形者非粗而性命之無形者非精也皆性命也皆禮樂也有精粗而無精粗也禮樂之有聲者非外而性命之無聲者非内也皆性命也皆禮樂也有内外而無内外也内外精粗之兩立而中在其中矣内外精粗之兩忘而中無所倚矣内外精粗非忘非不忘而中不可名狀矣故嘗試論之性不離命命不離性性命一中庸也性命降自天率性由道存乎人人不離天天不離人天人一中庸也道自道也成己也推此教人成物也已不離物物不離己物我一中庸也天之所以命人者曰命命之謂性性不離命命不離性也性命即中庸也帝降衷人受中天之所以爲天者常中而已是所命也即所性也故孟子曰性也有命焉命也有性焉率循也循其本然之性也雖氣禀有清濁厚薄之不齊而炯然不可亂者大抵相近而無不善也惟無不善故無偏倚無過不及在在有中莫匪天則吾何知哉惟率循之而已循性而行若大路然故曰道道本不待修也惟人之生欲動物蔽離其天則故必有窮理盡性至命之聖人爲之開導而品節焉俾之由中庸之道以復性命之正故曰教天命之性中庸之道也形色天性五事五常具焉天以此命人人奉天所命日日由是物物在是事事在是信矣哉道不可須臾離也世之人猖狂妄行者其離道固逺矣然亦不待猖狂妄行始謂之離道一念之差即離道何也一念之差必有係累必有執著未有不離者故著於上則離於下矣著於下則離於上矣著於左則離於右矣著於右則離於左矣著於有迹則離於無迹矣著於無迹則離於有迹矣著於可名則離於不可名矣著於不可名則離於可名矣何也以其執一故也執一則非中庸矣然則著於上下左右有無可不可之中間者足以盡中之義乎曰中庸無在無不在也舉中間以爲中固中也然止於舉中間則猶未足以盡中也惟夫舉上下左右有無可不可之兩端而中皆在其中此其所以無適非中也此其所以不離也曰不可須臾雜甚言其在在皆中庸造次必於是顛沛必於是而無斯須頃刻之可離耳使有斯須頃刻之可離則不足以爲中庸矣故君子於是戒謹恐懼焉所不睹所不聞非但屋漏闇室也十手十目之際而一念潛動孰睹之孰聞之惟自知耳此猶曰念動而人莫知也念之未動視於無形聽於無聲粲粲吾前者吾亦不自知其所以然也雖不可知而中庸固不可離也又發明之曰隱者最見㣲者最顯未形也而其幾已動未兆也而有開必先吾自以爲獨乎吾以獨爲可欺乎無有師保而父母臨之一陟一降而上帝鑒之自以爲可欺而吾之炯然不亂者不可欺也此獨甚可畏也甚可懼也知乎此則自不離道矣自能養性事天矣自能修身立命矣是之謂中庸之教中庸之道天命之性也離道是自離其性命也性命可須臾離乎試於不睹不聞騐之不睹何爲乎戒謹不聞何爲乎恐懼無可離之時故也當其不睹不聞非但屋漏闇室而已覿面對語一念潛動人知之乎人不吾知己自知耳念之未動已知之乎至隱也至㣲也己尚不知奚可名狀强名之曰獨吁此獨無對也即不睹不聞也隱也易之一畫也然而不睹與睹對不聞與聞對隱對見㣲對顯勿謂隱也而見莫甚焉勿謂㣲也而顯莫甚焉甚可畏也甚可懼也謹獨非他常中而已不離道而已非不離也無可離也離將安之未喜未怒未哀未樂之時澄然寂然性也既曰未發何以名中曰中不可名狀也可名狀者皆發也發非性乎曰發而中節亦性也發而不中節者性之動也中也者未發而不動也和也者雖發猶不動也常中而已常澄然寂然而已中言大本和言逹道大本固可通行而逹道由本而出中和一也一性命也致之爲言極也中和非在彼通體皆中和自己而致乃造於極喜樂皆陽也哀怒皆陰也一身之陰陽無乖則天地萬物之陰陽皆不乖矣自開闢以來天地何嘗不奠位萬物何嘗不並育然必有窮理盡性至命之聖人輔相裁成則定位不亂而生理不息雖然豈惟聖人哉人人皆有天命之性人人皆有喜怒哀樂未發之中人人皆有不睹不聞之獨念之哉敬之哉曰不睹曰不聞曰隱曰㣲曰獨何以見之未有喜怒哀樂時見之未喜未怒未哀未樂寂然而已性也及其發也則爲睹爲聞為見爲顯是以有喜有怒有哀有樂喜樂屬陽哀怒屬隂皆發也發非性乎雖然猶未發也寂然如初命之曰中和中太極也渾然未發爲陰陽大本也和太極之發也分隂分陽流行事物而皆中其節逹道也致極也極中和之至也有中和故有天地有萬物聖人極中和之至則天髙地下萬物散殊位焉育焉各正性命仲尼曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也中庸者通貫天人融會事物至精至當毫髪不差而平常日用之間舉目皆是盈耳皆是本非難知難行惟君子循之小人則反之此塗轍所由判也君子而時中當其可之謂時天有四時時時皆中祁寒盛暑似偏矣乃中也何獨不寒不暑爲中哉時中字釋中庸字尤明庸常也常中者無時非中也君子順性凝命雖萬變交錯而謹獨常存此其所以常中也小人之性夫豈本與君子異哉惟小人不知天命而不畏也人欲横流悖理傷道此固無忌憚之顯顯者亦有外似君子而内非謹獨反借不執一之名以葢其無忌憚之實是則深可罪耳故不執一者在慎獨之君子行之則爲時中在不慎獨之小人行之則爲無忌憚吁可畏也王肅本作小人之反中庸也不知無忌憚即反也何必贅君子即中庸也小人反之君子慎獨上帝臨汝故時時常中言中節也小人豈無降衷之性不知天命而不畏也故無忌憚子曰中庸其至矣乎民鮮能久矣中庸非動亦非靜而又非無動靜非虚亦非實而又非無虚實一而非執一無在無不在可謂至也已矣夫子𦂳切教人欲人於不睹不聞而謹其獨欲人知喜怒哀樂雖發而實未嘗發故曰中庸其至矣乎且傷世衰教失民之鮮能亦已久矣所以深警其聾瞶也中庸即中和也大本端的一毫不差逹道普平萬古無異函陰陽該動靜一而非執一無在無不在是所謂常中也此道其至矣哉噫民之鮮能何其久也子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也道之不行合曰賢不肖而乃以知愚言道之不明合曰知愚而乃以賢不肖言互見也學者未知而行謂之𡨕行知而不行謂之徒知故致知力行二者並進知及仁守得乃不失此中庸所以兼明與行言之也且夫賢知者負其聡敏絶人之識孤髙傑出之行宜若不易及矣今聖人折衷以中庸之道而賢知愚不肖其失則均然後知過猶不及皆非中道天命之性自有常中雖然中非執一也有似過而實非過者有似不及而實非不及者一順天則而已吁奈人之鮮知味何民之質矣日用飲食大羮元酒遺味存焉何謂味曰非可形容也亦非不可形容也知者自知耳道之不行以知愚言道之不明以賢不肖言互見也賢知髙矣聖人操中庸之權度以折衷焉而賢知乃與愚不肖等過猶不及故也天命之性自有常中奈人不知味何何謂味知者自知難以語人子曰道其不行矣夫前既言道之不行皆知愚過不及之弊此又申言不已嘆之屢憫之深而救之切也讀是書者盍亦深省乎玩此一語令人感動道非身外之物不行何爲子曰舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以爲舜乎知上加一大字舜心太虛也太虛澄然故聰明舜心太虛故大知人誰肯下問於人誰肯察淺近之言舜則中心篤好略無秋毫有我之私非大知乎大知照臨於上惡固無所逃舜則消伏融化而冺然不見其迹天下之善孰加於舜舜則樂取諸人而惟恐推揚之不至非大知乎大知即中也何以見其爲中上章言知者過之小知故耳大知無過亦無不及舜性之也性即中也問察隱揚順乎天則人己兩盡善惡兩融中可知矣天下萬事皆有兩端且以權衡言之有輕有重則有輕重之間輕重之間固中也輕重兩端亦各有中也舜執兩端用中於民其執衡用權之謂乎聖經互相發揮堯舜言執厥中得夫子執兩端之語而明得孟子執中無權猶執一之語而尤明舜不執一所以爲大知也所以猶太虛也太虛無物而隂陽互用宻莫加焉大舜無爲而審度兩端精莫甚焉惟精惟宻乃融乃一是爲中庸是謂天命之性故夫子復贊美之曰其斯以爲舜乎舜心太虛也故大知大知不自知去聲好問於人雖淺近之言必察焉隱泯也融化無迹也不間人我善惡兩融中在其中矣物皆有兩端執兩不執一也不執一故事事有中物物有中在在有中是謂用中或曰執兩端之語與執厥中何爲不同曰堯舜以聖授聖故止言執厥中而不執一之義已明性之也夫子立言以曉未逹者必曰執兩端用其中則不執一之義始明此教也子曰人皆曰予知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰予知擇乎中庸而不能期月守也知譬則水也知者之所樂也亦知者之所懼也何樂乎流而不息明燭鬚眉是誠可樂也故夫子曰知者樂水何懼乎洊至習坎險而又險是誠可懼也故易曰入于坎窞凶嗚呼易之入于坎窞即中庸所謂驅而納諸罟擭陷阱而不知辟者乎其所以然者惟自以爲知而已自以爲知者乃天下之大不知也使其果知耶則雖處重險之中未嘗不心亨也心亨者正所謂擇中庸而能守者也彼自以爲知而實陷於大不知則失其本心矣失其本心則心不亨矣心不亨則處平安尚難而况處險乎脫罟擭陷阱尚未能而况望其周旋於中庸之坦塗乎甚矣自謂予知之一語實古今天下膏盲不治之疾必去此疾乃可以㧞於罟擭陷阱中矣乃可與語中庸矣學者自知讀書孰不曰我曉中庸問其所以爲中庸者何如也有爲混融之説者則曰中即庸庸即中有爲精詳之説者則曰中不偏也無過不及也庸不易也日用常行也嗚呼習聞二者之説而實不能擇中庸守中庸是亦未免入於罟擭陷阱之中而莫覺莫悟也良可悲夫吾試問學者二説將安所擇其擇混融之説乎其擇精詳之説乎擇混融之説是中庸無所别也則曰中足矣而何以又曰庸曰庸足矣而何以又曰中吾未敢以爲安也未以為安而固守焉是守罟擭陷阱也擇精詳之説是中庸為各立也然庸言庸行無非中道天下大本萬古常行必曰中自中庸自廣吾未敢以為安也未以爲安而固守焉是守罟擭陷阱也彼豈以爲罟擭陷阱哉葢自以爲廣居安宅耳何則彼不肯自以爲愚而自以為知既自以為知矣終不知中庸之道果何謂而吾之所以擇而守之者果何在也其為不知莫甚焉夫中庸之道未嘗不混融也未嘗不精詳也今之談混融者實何嘗混融今之語精詳者實何嘗精詳彼自謂予知之私見錮於胷中牢不可破又豈識所謂中庸哉善乎子思之論舜曰舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以爲舜乎夫舜大聖人也極天下之知孰能加之而舜未嘗自以爲知理之所當問者毎好問而不厭言之所當察者雖邇言而必察是其心果如何哉孰爲善孰爲惡如辨白黒如數竒耦可以爲知矣而舜不自以爲知惡則泯然融化不見其迹善則顯然推揚使見於世是其心又何如哉惟其無我而已人之本心天地同大自夫人以有我之私間之藩籬植焉矛㦸生焉小知自矜本心日蔽其去中庸逺矣大舜之心洞然大空何者爲我我尚不立何者爲物無我無物物我一貫當問即問當察即察當隱即隱當揚即揚無髙妙無竒特中中庸庸如是而已兹其所以為大知也子思之論舜不兼言中庸而獨曰用中中庸之名雖殊而實未嘗不一也中庸之實本一而名不害其爲殊也獨言用中兼言中庸無不可者由是言之謂中爲不偏庸爲不易可也不易者必不偏不偏者必不易所謂中即庸庸即中其説亦不相悖也謂中為無過不及庸爲日用常行亦可也無過不及者必可日用常行日用常行者必無過不及所謂中即庸庸即中其説亦不相戾也非心通黙識實有自得者何足以語中庸哉雖然堯之咨舜曰允執其中舜之命禹曰惟精惟一允執厥中子思論舜之用中乃曰執其兩端夫兩端則非一一則非兩端子思之言與舜之自言若不相似然何歟噫惟心通黙識者則知一之即兩矣知兩之即一矣孟子曰是非之心知之端也有事於此必有一是必有一非是非對觀中在其中矣至於中則歸於一是矣不獨是非也凡天下之兩皆一也一即中也故惟大知則能盡燭兩端兩端在是則一中在是是故子思發明執兩端之理其於執中二字有大功焉何則執中無權之弊不待戰國時有之意春秋之季有此弊矣孔子曰鄉原德之賊也固執所見自以爲中庸而不知乃中庸之賊也故子思於是斷之曰所謂執中者執兩端而中自在其中非執一以為中也何其言之精㣲如此哉嗚呼斯道也易道也伏羲之卦始於一畫有一即有兩兩者一之分一者兩之合兩與一不相離也一隂一陽中在此矣中無體也無方也未嘗無體也未嘗無方也故曰一隂一陽之謂道又曰分隂分陽迭用柔剛心通黙識者其必有得於斯矣雖然易不言中庸而每言中正中正中庸無二道也二五皆中也以九居五以六居二是謂中正反是則雖中而非正矣吾嘗謂離之照臨四方晉之自昭明德是天下之大知也而離之六二黄離元吉晉之六二受兹介福于其王母聖人一則曰得中道也二則曰以中正也至于二卦之五以六居之雖中而非正然皆不失其爲吉以是知惟中乃可以言繼明乃可以言昭明不能擇守中庸而自謂予知者可乎哉此猶未也葢至明夷一卦而聖人之㫖愈見矣明出地上爲晉明入地中爲明夷夷傷也有明德者謂之知然而猶有所傷何哉嗚呼天地隂陽消息盈虚之理其妙固如此也天下有常吉而無凶悔吝者乎有常處富貴而無貧賤夷狄患難者乎有一於陽而無隂一於進而無退一於存而無亡者乎使道而可以獨立則不足爲道矣惟其明德之不能無傷也吾於是觀中庸焉惟明德見傷而能用晦而明也吾於是觀擇中庸守中庸焉初爻飛而垂翼用晦也二拯馬而速行亦用晦也未遇其時處明以晦可謂善擇中庸而能守中庸矣六五坤體得中道焉中而非正於是發箕子明夷之義位雖非正而志則正矣故曰内難而能正其志處紂之時居父師之位不死不去居難而不失其正非箕子審擇中庸而固守不移豈足爲明不可息哉非特箕子明不可息也㣲子比干皆明不可息也何則三子之自靖皆仁也皆中庸也皆善擇善守者也夫以三子之大賢尚且不敢自以爲知居危亂之邦而相與荅問之辭其懇惻痛切一至於此偃然自謂予知者能如是乎四之入於左腹上之後入於地一則巧中不明之君一則自處極闇之域正所謂納於罟擭陷阱而莫知辟也彼豈自以爲不知哉其失正在於自謂予知耳一念之差聖狂易位擇中庸者宜于是兢兢焉雖然徒曰用晦而明居難而不失其正是知也是善擇善守也至於當可爲之時而不能奮大有為之勇聽斯世之淪胥孤生民之徯望烏得為中庸烏得為知故聖人又於九三之爻特著其義明夷於南狩得其大首其湯武之事乎三與上正應上極闇而下極明誅其君弔其民此固聰明勇智者所當為也然而猶有戒心焉故曰不可疾貞聖人亦曷嘗敢遽用其明哉遽用其明而自謂予知也非聖人之心也夫以湯武大聖尚不敢自謂予知擇中庸者宜如何耶是故湯武之征伐堯舜之揖遜一中庸也禹稷之過門不入顔子之簞瓢陋巷一中庸也曽子之去子思之守一中庸也夏葛冬裘渇飲飢食何徃而非中庸哉何徃而非善擇善守哉吾試為學者申言之今學者之病非墮於知即墮於不知耳人皆曰予知此非真知也乃墮於知也驅而納諸罟擭陷阱之中而莫之知辟此非真不知也乃墮於不知也使其真知耶中庸我所固有也何罟擭陷阱之能納使其真不知耶滿宇宙皆中庸也何罟擭陷阱之可辟孔子曰知之爲知之不知為不知是知也孟子曰禹之行水也行其所無事也如智者亦行其所無事則智亦大矣此真知也非墮於知也非罟擭陷阱之能納也詩之詠文王曰不識不知順帝之則此真不知也非墮於不知也無罟擭陷阱之可辟也故惟真知者可以語真不知矣惟真不知者可以語真知矣嗚呼學者而逹於此始可以語中庸矣此非吾言也子思子言也德輶如毛毛猶有倫上天之載無聲無臭至矣其有知乎其無知乎其可以知不知論乎毛尚有倫中庸其有倫乎其無倫乎天無聲臭中庸其有聲臭乎其無聲臭乎果可以有無論乎果不可以有無論乎故曰喜怒哀樂未發謂之中至於此不特非論説之所能與亦將不見論説之可與矣不見論説之可與者始可以為心通黙識矣夫是之謂自得之學入罟擭陷阱而不知辟以喻擇中庸而不能期月守也中庸安宅捨安入險愚甚矣尚自謂予知耶皆曰予知乃大不知不曰予知即舜大知人苟自患其愚終有時乎不愚若不自知其愚長無開明之日矣罟擭陷阱當避不避是天下之至愚也而懵不自覺尚且自謂予知耶嗚呼孰有轉罟擭陷阱爲安宅坦塗者乎罟擭陷阱非元有而安宅坦塗非元無也天命之性固自有中庸也以此擇之以此守之終吾身可也而乃不能期月守望望焉舍而去之是何爲善不果而爲惡則勇也一性靈明本無不照昏迷之極良可痛悼聖人警悟之者切矣
