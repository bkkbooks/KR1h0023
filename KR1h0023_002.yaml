body:
  text: 欽定四庫全書䝉齊中庸講義卷二宋袁甫撰子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣善惡遼絶擇之易耳似善非善擇之最難顔子善擇而得之得此一善何所不通拳拳服膺仁守之功密矣舜性之也顔子不失性者也惟明性者乃能擇善己性不明雖滿目皆中庸安能擇而守之顔子屢空此性靈明何所不照既得一善一可該萬常人雖暫得而易失顔子服膺則永永弗失矣非有所係而不失也不係而自不失三月不違仁是也吾謂顔氏子之學幾於舜之大知矣幾於舜之執中矣前章論舜此章繼論顔子蓋子思子特以二人擬倫而啓發後學之心也學者觀此胡不豁然自省乃知無名位祿壽與享名位祿壽之極者其實則一此正可以見性命之不相離也若謂舜有大德受天明命則顔子終身匹夫且不幸短命遽謂天命不在顔子可乎顔子雖無貴為天子之名而榮華至今名莫加焉非天定耶嗚呼顔子何以得此於天哉其言曰舜何人也豫何人也顔子惟盡人之所以為人者而已人者何性是也子曰天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也善處事者能均天下國家亷者能辭爵祿果者能蹈白刃而惟中庸則不可以能天命之性良能也前章鮮能者鮮有能其不可能者也均天下國家善處事者能之辭爵祿亷介者能之蹈白刃果敢者能之天下無不可能之事而惟中庸則不可以能也皓皓純白天則自然何所容其能哉究極而言執可均可辭可蹈之見已非中庸之道矣何則不以一律均者中庸之均也辭受各中其節者中庸之辭也死生各當其可者中庸之蹈也而執一者豈中庸哉天命之性自有常中一毫偏倚非天命也子路問强子曰南方之强與北方之强與抑而强與寬柔以教不報無道南方之强也君子居之祍金革死而不厭北方之强也而强者居之故君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯子路好勇故問强夫子叩兩端告之曰抑汝之所謂强與蓋已足以啓發子路矣南北剛柔不同而皆曰强何也南以含忍為强北以果敢為强氣習然也南人禀溫厚之氣以寬柔誨人無道則不報其强也君子然偏於柔矣北人禀嚴凝之氣勇於用兵死且不厭則偏於剛矣偏隨生禀性則無偏孔子謂之相近孟子謂之善中庸言天命之謂性順乎性命意泯欲盡動靜一死生一乾之純剛行健坤之至柔動剛此則聖門之所謂强也其和也不流於人欲其立也不倚於一偏常中而已國有道不變塞焉臯陶曰剛而塞塞實也遭世平治安常履信不必變也不幸世亂固守義命有死而已亦終不可變也觀兩不變字見君子之常中矣矯强貌亦有用力意氣質偏勝矯而復中用力而非助長也剛中柔中本自有中而非必外求也子路之不得其死夫子已預知之其仕衛也豈不曰蒯聵無母國人不君之矣然輒之拒父亦名教罪人也不足死而子路死之惜哉雖然以喪子之戚喪子路夫子不深貶也結纓一節亦可謂竒男子矣若子路者豈可純謂北方之强哉子思列此章次於顔子之後亦欲使學者知處死生之變以不失性命之正子路未足師也師吾夫子不變之言可也書曰剛而塞國有道素履篤實不必變也國無道盡忠致命不可變也莫非命也順受其正乾之剛健坤之柔剛中庸也此聖門之所謂强也子曰素隱行怪後世有述焉吾弗為之矣君子遵道而行半塗而廢吾弗能已矣君子依乎中庸遁世不見知而不悔唯聖者能之死生出處人之大節也非特處死生難處出處亦難上章既言至死不變此章言隱遁之事素猶素其位之素言素於隱也素隱不顯則君臣之義廢矣是天下之怪行也仕止久速各當其可奚以怪為雖使見述於後世直盜虛聲耳夫子深貶之故曰吾弗為之矣君子其遵道乎既曰道矣而又半塗而廢則何以造此道之極夫子許其遵而咎其廢也故曰若我則弗能已也我惟依乎中庸而已依猶依於仁之依言未嘗離中庸也既非違道而行怪又非半塗而廢道非中庸而何遁世與素隱若同實異素隱有好名之心遁世無求知之念世不知中庸故不知我我以其不知而遂萌悔心是悔中庸也中庸而可悔乎自知自遁寧逺人知上不求知何以悔為聖者之事中庸在斯性命在斯惟遁世乃可經世惟經世乃可遁世實一機也素隱不顯大義廢矣怪也吾弗為其遵道乎既曰道矣奈何而廢吾則弗已吾惟依乎中庸不怪不廢世雖莫我知泰然無悔肥遁也唯窮理盡性至命之聖人能之君子之道費而隱夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉詩云鳶飛戾天魚躍于淵言其上下察也君子之道造端乎夫婦及其至也察乎天地道無所不在費也道果何在隱也夫婦之愚不肖可以與知能行費也及其至也雖聖人有所不知不能隱也至之為言不可得而形容也謂無形與聲耶而未嘗無形與聲謂有形與聲耶而形聲又不可得而盡也不然以聖人之聰明曷為而尚有不知尚有不能乎不特聖人而已大莫大於天地然亦有虧遺不滿之處日月之有薄蝕也星辰之有失行也陵谷之有變遷也人曰是數然也天非制數者乎曷為不使之無薄蝕無失行無變遷也而猶有遺憾者何耶噫天地之所不容致詰者乃所以為天地之大也亦猶聖人之不知不能者乃所以為此道之妙也喜怒哀樂未發之中可知歟可能歟不睹不聞之獨可知歟可能歟不如是不足以為至也故繼之曰語大天下莫能載焉語小天下莫能破焉天地尚有憾斯語也孰得而載之愚夫愚婦皆知皆能斯語也孰得而破之語大語小莫匪中庸中庸固不間小大也有上即有下而上下皆中庸也鳶飛戾天魚躍于淵言其上下察也此察非內知見也亦非外知見也君子之道造端乎夫婦夫婦之端非在此而鳶飛魚躍非在彼也夫夫婦婦即飛者躍者飛者躍者即夫夫婦婦一中庸也及其至也察乎天地天地非在彼而夫婦非在此也夫夫婦婦即上天下地上天下地即夫夫婦婦一中庸也身不行道不行於妻子閨門衽席之間最可以驗進德之實於此而或愧怍焉雖有蓋世之功名斯亦不足貴也已注家䝉上夫婦之愚未安故不從道無所不在夫婦之愚不肖皆可以與知能行費矣及其至也雖聖人亦不知不能何隱也是正所謂喜怒哀樂未發之中也正所謂不睹不聞之獨也何所容其知何所容其能豈特聖人為然雖以天地之大至於不容致詰之處人皆有所憾於天地而不知此乃所以為天地也嗚呼至矣隱而未發即費而發者隱不睹不聞即費而睹聞者隱而天地之不容致詰聖人之不知不能即費而愚夫愚婦之與知能行者語大語小而莫載莫破何間於大小哉鳶飛魚躍而上天下淵何間於上下哉造端夫婦而察乎天地何間於夫婦天地哉故亦及其至是至也費不離隱也隱不離費也此天命之性也何以見之天之所以命人者清濁厚薄有萬不同費也雖有清濁厚薄之不齊而炯然不亂者默存乎其中隱也隱豈離費乎費豈離隱乎天下莫能載君子之語大天下莫能破君子之語小何以能然耶曰惟養其言語之所自出者而已矣吾嘗發問於學子且告之曰君子之言精粗小大無不及也何以莫能載何以莫能破而學子所答未有領解斯㫖者吾試博講而詳說之然後反說約可乎詩曰謹爾出話曾子曰出辭氣言雖自口出非自口出也其自心出乎言心聲也則是自心出也心知其所從出乎心無意於言而不能不言也易繫曰出其言善則千里之外應之出其言不善則千里之外違之善不善之幾伏於毫芒眇忽之微而應不應之驗乃在千里之逺善言自口而出也不善之言亦自口而出也自口而出者皆自心而出也心豈有善不善哉心無不善也心無不善則言亦無不善可也書曰敬忌罔有擇言在身孝經曰言滿天下無口過言至於無可擇則純乎善矣彼有雜出乎善不善之間者亦有大體雖善而未免乎一二之瑕疵者此豈在於發言之時哉亦惟其平日之所養如何耳純乎善而無不善者所養之純者也雜出乎善不善之間者無所養者也大體雖善而未免一二之瑕疵者有所養而未純者也故曰惟養其言之所自出者而已矣語大語小於六經備見之道本無小大亦非無小大故聖人之經語及於大者小未嘗不包也而人以為語大語及於小者大未嘗不具也而人以為語小小大未暇辨也盍亦求其所謂不可載不可破者乎伏羲以前未有文字自畫八卦載籍始生文王重之夫子繫之隂陽剛柔動靜吉凶千變萬化大略皆於言辭有考焉典謨訓誥誓命之書天人之道詳矣詩三百篇比興賦風雅頌衆體畢備故曰不學詩無以言禮樂不傳於後世粗識先王聲明文物之盛者以其猶有禮樂之文字存也春秋二百四十二年之行事一褒一貶以空言而欲行賞罰善人勸焉淫人懼焉萬世之下名之曰經嗚呼人之尊且信若此故莫能載莫能破矣豈聖人之言異於人哉惟養其言之所自出者而已矣孔子曰有德者必有言有言者不必有德聖人無意言也此心虛明洞逹純粹精一則發於言者不過寫吾胸中之所存耳夫是之謂聖人之養自非聖人則不可以不修辭乾卦曰修辭立其誠所謂修者非飾辭之謂也言顧行行顧言平時涵養內充既無不善矣發言之時又必謹思密察當而後發是之謂修辭辭修則誠立矣誠立而所養愈固矣詩曰于時言言于時語語言語非一端也語朝廷則貴乎直語鄉黨則貴乎謙語學校則貴乎莊語家庭則貴乎和歌頌之語麗而則禱祠之語恪而信專對之語辨而中傳檄之語激而揚欵識之語簡而古誄諡之語思而實其歌也清越而長其史也鋪張而核議禮也据古誼讞刑也酌人情語閒燕而毋淫語不平而毋訐語上交而毋諂語下交而毋瀆語亦多端矣自聖人言之本無語大語小之别也而人之觀之者有所謂語大焉有所謂語小焉然大概所養厚則不勞而成章信今而傳後所養未厚則雖粲然可觀言而已矣非有德之言也雖日傳萬紙目前而已矣非能垂不朽也自古大聖大賢胸中所養海涵地負曠兮莫窺其畛域浩乎莫測其涯涘故其發揮於言語之間者若日月麗乎中天其輝光無不燭也若川流而駛若矢激而逺其力量不可當也猶且斂而藏之遜以出之呐呐似不能言者其言也訒所以為仁訥言敏行所以為君子辭有枝葉即歎天下之無道而尚口乃窮作易者深戒之駟不及舌以其悔不可追也三復白圭以其玷不可為也無易由言知口起羞也非禮勿言欲接以道也凡此者皆養其言之所自出也非獨修身為然而觀人亦然辭寡吾知其為吉辭多吾知其為躁辭慙吾知其將叛辭枝吾知其心疑辭屈吾知其失守詖淫邪遁吾知其所蔽所陷所離所窮自唐虞考績亦必先於納言而不知言則無以為知人之明然則由載籍以來大抵謹言者無過輕發者多失然而皇極則曰敷言惟恐辭㫖之不敷暢孔子又曰辭逹惟恐言語之不發揚又何也噫敷言未嘗不謹言也辭逹未嘗不修辭也終日言而言皆道也彼巧言如簧者利口覆邦家者止可欺世亂俗耳一遇君子則將口呿舌卷之不暇而又何所容其喙耶雖然聖人又曰豫欲無言然則有言未為至而無言乃為至乎噫有言無言一也言不可以有無論也天不言而四時行百物生其行也其生也皆天之教也曷嘗不言哉子貢不逹斯㫖乃曰子如不言則小子何述焉吁夫子豈真隱耶吾無行而不與二三子猶四時行而百物生也易繫曰君子之道或默或語語默一也可言者即其不言者也不言者即其可言者也號令之渙發猶雷風之鼓舞及其既收則猶雷風之寂然耳豈有二雷風哉無形無聲之中乃有奮迅生育之妙此聖人所以與天為徒也吾既博講詳說至此矣盍更反而說約焉學子其聽之至大而天下莫能載曷為而莫能載也包羅天地該括事物天下方待君子之言以載故不能載者惟君子能載之而天下又何以載君子使其可載是輕易膚淺之言非君子之言也雖小而天下莫能破曷為而莫能破也幽通鬼神微入毫髮天下方待君子之言以破故不能破者惟君子能破之而天下又何以破君子使其可破是偏駮怪異之言非君子之言也堯之文思光被天下而天下莫能載堯文之煥舜之文明協于帝而天下莫能載舜文之華禹之文命敷四海而天下莫能載禹之文命周王之文德肆時夏而天下莫能載周王之文德夫子之文章可得聞而天下莫能載夫子之文章夫語大不可得而載而况語小可得而破耶語大者天地之大人猶有憾也語小者天斯昭昭之多地一撮土之多也語大者聖人有所不知不能也語小者夫婦之愚不肖可以與知與行也皆語也皆道也有小大而無小大也孔子之惡鄉原以亂德賊德斥之孟子之距楊墨以無父無君斥之片言之下真如破的孔孟能破鄉原楊墨而天下萬世未有能破孔孟之言者夫惟天下不能載故能載此道天下莫能破故能破羣言此聖人之事也然則學聖人者宜何所用力曰養氣為先樂記曰氣盛而化神和順積中而英華發外惟樂不可以僞為天下固未有氣餒而言宣亦未有氣盛而化不神者也江海流而不息溝澮涸可立待孟子之知言亦自養氣始是之謂反說約子曰道不逺人人之為道而逺人不可以為道詩云伐柯伐柯其則不遠執柯以伐柯睨而視之猶以為遠故君子以人治人改而止忠恕違道不遠施諸已而不願亦勿施於人君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾道者天命之性人人自有何嘗遠人其所以遠者人自逺之道在邇而求諸逺則不足為道矣聖人欲提省人心使知道不逺人於是以柯為喻伐彼柯者必用此柯彼之長短取則於此可謂甚近然尚有彼此之别微視之猶遠也此未足以形容道不遠人也亦嘗思人之所以為人乎通體皆道也人外無道也以人治人者人昧於為人而教以人道故曰治不曰我治人而曰以人治人我亦人耳人道不離吾身亦不離各人之身吾有此則人亦有此則以則取則天則自然而非彼柯假此柯之比也人有過焉能改則止若責人已甚違天則矣故曰忠恕違道不遠忠恕二字見得以人治人最明違道不遠即道不逺人也人之所以為人者忠恕而已道最近人忠恕最近道何則中心為忠如心為恕試以心體之人以不願施於我必非我之所願人我一也而我乃以不願施諸人豈中心如心之謂乎中心如心者以人治人而已夫子又謂不遠人之道其目有四事君事父事凡交朋友四者最切於人以夫子之聖猶曰吾未能一也方且求其事之之道求其先施之道曷求哉求諸言行而已矣言行皆曰庸庸即中也惟中故常德之行常行也常言之謹常言也常言常行人所易忽也而聖人於此未嘗放逸可謂常中矣不足則加勉有餘則不盡有餘不足即中庸也或謂事君事父兄交朋友之道惟患不足寧患有餘殊不思天命之性自有常中過與不及皆非中道而豈必有餘哉自古事親事君善處兄弟者莫如舜舜盡孝盡忠盡友中而已非餘也不盡者不盡其餘而非不盡中也中盡則無過不及矣而聖人一念兢業猶且言必顧省其行行必顧省其言斯其為體天行健乎斯其為窮理盡性至命乎豈獨聖人當然具天命之性者皆當然慥慥篤實貌言君子欲言行相應何可不務實也讀中庸之書者口未嘗不談中庸然書自書我自我口言之身不行之是言行不相顧也嗚呼盍亦痛省而如鞭乎道者天命之性不逺人而人遠之不觀伐柯乎彼柯之長短取則於此柯近甚矣微視之猶遠也人靈於物通彼此皆道也不曰我治人而曰人治人我亦人耳道不離吾身亦不離各人之身性本相近昏而有過患不能改能改即新舍惡遷善可以止矣唯何甚此忠恕也道最近人忠恕最近道己所不願何可施於人也父子君臣兄弟朋友之道聖人豈不能盡而乃曰吾何能吾惟庸德是行庸言是謹不足則加勉有餘則不盡言行相顧如是而已是謂中庸是謂率性為君子者胡不慥慥而行君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉在上位不陵下在下位不援上正己而不求於人則無怨上不怨天下不尤人故君子居易以俟命小人行險以徼幸子曰射有似乎君子失諸正鵠反求諸其身無新故之謂素居其所之謂位不素其位跬步不行素則行矣循理順則不願乎外純乎中庸也中庸無不在也在富貴而亨在貧賤夷狄患難而非困皆中庸也亨居一困居三雖困亦亨無入而不自得也有通塞而無通塞也有逆順而無逆順也此隂陽健順動靜之妙也性如是命如是中庸如是中庸不以位髙而亢何陵之有中庸不以位卑而屈何援之有惟正己而已矣自成自道無求於人既無所求奚怨奚尤此正己之謂也正則平易不正則險易者中庸險者反中庸故不明中庸性命者必不能居易不能居易者必行險徼幸徼幸者必不可常不常而致敗者必怨尤噫孰有幡然悔悟而反諸身者乎仁者如射失諸正鵠不怨勝已者自反而已射有的道亦有的中庸在身匪屬他人無新無故至平至易嗚呼省乎不省乎位者何天之所以命我者是也性不離命命不離性何以見之富貴命也貧賤夷狄患難亦命也素也者不以富貴貧賤夷狄患難二其心也雖所禀有清濁厚薄之不齊而炯然不亂者常自若耳知性知天何入而不自得不陵下而曰在上位不援上而曰在下位位云者即素其位之位也在上在下此命也而不陵不援則性也君子所禀既清且厚守正無求自無怨尤正則平易安吾定分以俟之是謂知命之君子小人則不然背正就邪舍易趨險彼蓋不素其位而求脫乎貧賤夷狄患難之困以覬望夫富貴之亨其間亦有冒焉行險徼幸以得之者矣然謂之徼幸則不得焉者亦多矣若小人所禀既濁且薄而又加戕賊焉正所謂小人不知天命而不畏者也又何足與語君子率性之道哉君子如射失諸正鵠不怨勝己反求諸身而已矣身也者即天之所以命我者也養性立命者反求之實也君子之道辟如行逺必自邇辟如登髙必自卑詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽宜爾室家樂爾妻帑子曰父母其順矣乎逺近髙卑皆道也致知則於卑近識髙逺力行則自卑近而至髙逺致知不造其極則力行亦𡨕行耳卑自有髙近自有逺本不相離彼知道者往往忽近而厭卑獨不觀易詩之訓乎婦子嘻嘻何為而失家節也蓋以溺于人欲不知天則故爾若夫王假有家交相愛也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定此乃天命之性率性之道至近至逺至卑至髙不可以形容盡也戀妻子之愛終有悔吝豈能如琴瑟之和乎父子兄弟天性也本孝本友其或虧于孝友者妻子之私奪之耳今焉妻子好合而兄弟樂宜爾室家而父母順所謂家道正而天下定者是也豈非天命之性率性之道乎子思引詩而又以夫子之言證之厥有㫖哉孝經曰孝弟之至通於神明光于四海無所不通此又曰父母其順矣乎然則近可逺卑可髙之理捨孝何以哉此章於人身最􅋀人誰無父母兄弟妻子行乎人倫之中而礙焉泥焉者多矣于此而猛省則當求其所謂近可逺卑可髙者讀中庸之書正欲驗諸履踐耳徒讀其書不履諸身萬萬無益也閨門之間勿謂隱微一有過差最為顯著嗚呼敬哉子曰鬼神之為德其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可掩如此夫明則有禮樂幽則有鬼神一也上章既言人倫此又以鬼神明之何以見鬼神之盛德人函隂陽之氣而生及其死也體魄則降其名曰鬼發揚於上其氣則神神無不之亦無不在雖不可見不可聞然體物則不可遺此物何物也隂陽也無物之中未嘗無物以物為體若何可遺獨不觀諸祭祀乎齊明盛服無使之者而若有使之者精爽洋洋與人之齊明默若相接如在左右非虛見乃實理也實理者隂陽也非終始而有終有始非往來而有往有來非合散而有合有散隂陽健順之理固如此也神用變化之妙固如此也是謂命是謂性是謂中庸是謂鬼神之盛德德即性也又引詩神之格思不可度思矧可射思度之尚不可况可得而厭射乎非鬼神之不可厭射也性命中庸之道本無厭射也又贊嘆之曰微之顯誠之不可掩如此夫言顯微隱見其致一也微未嘗不顯而誠未嘗掩也學者讀中庸須思聖人何為發明鬼神之道又思聖人反覆形容何為於此下一誠字嗚呼欲識不睹不聞請觀於此欲識君子謹獨請觀於此欲識物之終始不誠無物請觀於此此書發明誠字不待後面論誠而已開端於此矣所當通看隂陽一生死一鬼神之盛德雖不可見聞然物物皆體若何可遺齊明奉祀之時洋洋如在者皆性命也度之不可而可射乎聖人贊嘆之曰微之顯誠之不可掩如此夫誠者何物物皆體也洋洋如在也子曰舜其大孝也與德為聖人尊為天子富有四海之內宗廟饗之子孫保之故大德必得其位必得其祿必得其名必得其壽故天之生物必因其材而篤焉故栽者培之傾者覆之詩曰嘉樂君子憲憲令德宜民宜人受祿于天保佑命之自天申之故大德者必受命既論鬼神之德遂言舜之大孝孝通神明顯微一也費隱一也自古稱孝者多矣惟舜加一大字何以見其大以天子之尊尊其親以四海之養養其親宗廟我饗子孫我保有大德故也大德者何中庸是也雖然論中庸之大德而必及於名位祿壽者何哉太極函三性命已具五常天則不離形色名位祿壽皆道也聖則循性順則建極凝命故名位祿壽兼而有之聖人即天也因論天人不相離遂言化生萬物因材而篤材即天命之性也篤厚也栽者培之率性則天佑之也傾者覆之不率性則天棄之也而又有盡性如聖人者則受天明命禍福不同咸其自取天何心哉皆所以篤厚之爾又引假樂之詩為證而斷之曰大德必受命嗚呼學者於此可以觀天命矣是書首句曰天命之謂性孝經曰父子之道天性天性既盡則命在其中矣味大德受命之語孝性之通於天如此哉雖然中庸之道無固無必今論名位祿壽既疊四必字而大德受命又加必字何耶曰此其所以為中庸也有取必之心非中庸也以為斷不可必而一諉諸天亦非中庸也知道者自知毋庸贅辭孟子曰性也有命焉命也有性焉性命不相離吾於大舜見之夫舜所以為大孝者何也以天子之尊尊其親以四海之養養其親宗廟我享子孫我保有大德故也大德者何窮理盡性至命者也天之所以命人者曰命是之謂性名位祿壽亦天性所自有也天化生萬物因材而篤栽培傾覆咸其自取舜之大孝得性之純全而又種德最深故天之培之者尤篤其坎所禀微偏然己能栽之天亦培之若夫所禀愈偏又傾焉而不栽則天亦從而覆之耳非天覆之也自覆也嗚呼論其所禀雖有清濁厚薄之不同而炯然不亂者常人與舜本相近本無不善今乃自傾以取禍亦可以反思矣援詩為證以見大德必受命與舜最可驗也雖然吾夫子非大德乎曷為不受命也曰天不輕畀人以祿位而尤嗇豫人以名壽吾夫子巍巍乎為萬世禮樂之宗主其為受命大矣故嘗謂顔子非不仁壽冉閔非無尊爵况夫子乎性不離命命不離性觀於此尤信子曰無憂者其惟文王乎以王季為父以武王為子父作之子述之武王纘大王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟饗之子孫保之武王末受命周公成文武之德追王大王王季上祀先公以天子之禮斯禮也逹乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪逹乎大夫三年之喪逹乎天子父母之喪無貴賤一也既言舜孝之大又更端而言曰無憂者其惟文王乎舜不解憂者也文王無憂者也皆命也有性焉吾惟知吾親而已吾惟盡吾性而已瞽瞍乎王季乎吾不知也文王父作子述武王繼纘厥緒有天下顯令名饗宗廟保子孫與帝舜同歸一揆富貴非道外之物中庸即天性之孝至此亦昭昭矣末終也武王終文王受命之事周公於是推廣文武之德追王太王王季併以天子之禮追祀先公蓋申言孝道之光明以見聖人窮理盡性至命之極功斷不出於孝之一字非特天子追王之禮為然推之於諸侯大夫士庶人葬祭之禮皆然喪從死祭從生隨喪祭之時義而斟酌焉夫以常情言之人子孝親之心何有紀極然過猶不及皆非中道品節劑量是乃中庸因言葬祭又推之於喪服自期以下諸侯絶大夫降而父母之喪貴賤同之此皆周公即追王之義制為禮法使天下共由於中庸之道其為孝也至矣孝經曰考莫大乎嚴父嚴父莫大乎配天則周公其人也吁斯其為窮理盡性以至於命者乎子曰武王周公其逹孝矣乎夫孝者善繼人之志善述人之事者也春秋修其祖廟陳其宗器設其裳衣薦其時食宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎周公佐武王制禮作樂無非中庸之道故繼言武王周公之逹孝逹通行也亦有通變義志以此而繼事以此而述文王遵養時晦武王卒其武功迹異實同所以為善繼善述也執一者何足以語中庸哉祖廟者先王先公之廟祧也宗器者如赤刀大訓天球河圖之類是也裳衣者先王先公之遺衣服所以授尸也時食者四時薦享之物也祭有昭穆所以别父子逺近長幼親疏之序故有事于太廟則羣昭羣穆咸在而不失其倫也序爵者序諸侯諸臣與祭者之爵位序事者别賢能而授之事太宰贊玉幣小宰贊祼將之類是也旅酬下為上旅衆也饋食之終羣有司更相獻酬使皆得申其敬所以逮賤也祭畢而燕則以毛髮之色别長幼之齒也自饋食而上皆行於廟中之禮也行禮於廟有所思乎無所思乎洞㓊屬屬奉承而進之自敬乎有使之敬者乎以其恍惚以與神明交神明在乎不在乎誠者物之終始不誠無物有形體乎無形體乎噫是可以省矣思何所起而起敬何所為而為在何所在不在何所不在有何所有無何所無神明不離於斯中庸不離於斯性命不離於斯踐先王之位行先王之禮奏先王之樂先王之所尊者吾亦敬之先王之所親者吾亦愛之當此時也此心何如哉親死矣葬而亡矣儼然如吾親之生存焉入室僾然見其在位出户愾然聞其嘆息之聲也當此時也此心何如哉噫是可以省矣喜怒哀樂未發之中於此時可見矣不睹不聞之際獨於此時可見矣孝之至也是吾性是吾命也宜乎其至也郊言事上帝而社亦云者何也地雖載萬物而始萬物者天也言禘不言祫言嘗不言禴祠蒸舉一以概其餘也或言禮或言義禮義皆中庸也治國如示諸掌示與視同言易見也治國甚難而曰易何也平常易簡匪髙匪深戒謹恐懼常如在廟吾性如是舉六合之內性皆如是隂陽剛柔仁義禮樂闔闢變化委蛇繁重皆性也皆平常易簡也吁吾於是識費隱焉識微顯焉識自邇自卑焉識誠焉識中焉識天命焉此識何識也示諸掌也逹通也繼志述事不膠于迹故曰通祖廟先王先公之廟祧也宗器國之玉鎮大寶器如赤刀大訓天球河圖之屬也裳衣先王先公之遺衣服祭則授尸也時食四時薦享之物也左昭右穆有事于廟則羣昭群穆咸在而不失其倫也序爵序與祭者之爵位序事則賢能而授之事也旅酬下為上旅衆也饋食之終羣有司更相獻酬使得申其敬所以逮賤也祭畢而燕則以毛髮之色别長幼之齒也位是踐焉禮是行焉樂是奏焉親之所尊者吾敬之所親者吾愛之親死矣葬而亡矣儼然如吾親之生存焉入室僾然若見其形出户愾然若聽其聲當此時也其不睹不聞之戒懼乎其莫見莫顯之隱微乎非吾性乎孝之至也信乎其至也郊言事上帝而社亦云者何也地載萬物而始萬物者天也止言禘嘗省文也或言禮或言義禮義皆中庸也治國其如示諸掌若曰其在斯乎斯者何也常如在廟也
