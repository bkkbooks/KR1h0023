body:
  text: 欽定四庫全書蒙齋中庸講義卷四宋袁甫撰誠者自成也而道自道也誠者物之終始不誠無物是故君子誠之為貴誠者非自成已而已也所以成物也成已仁也成物知也性之德也合外內之道也故時措之宜也誠即道也非二物也自成自道豈有所為哉循乎天則而未嘗加毫末於其間也誠成通誠者物之終始舉天地間皆物也有是物則有是誠終而始始而終如循環無端豈有盡際周遍彌滿略無少罅曲折變化莫匪天則此物之終始也不誠是無物也故君子誠之為貴非特已有是物舉天下人皆有是物一草木一蟲魚皆有是物物即誠也人之言曰成己在先成物在後今曰成己仁也成物知也然則先仁而後知乎噫道心大同孰先孰後不明乎物奚以成己不明乎已奚以成物成己固仁也言仁則知在其中成物固知也非仁則豈能與物無間故曰性之德也仁知雖異名其為天命之性則一知者知此仁者仁此析之曰仁知可也總之曰德性可也性之德三字不可不涵泳有此性則有此德實然之理也仁所以成己知所以成物非實乎艮其背不獲其身何者為己行其庭不見其人何者為物內不見已外不見物果實乎非虛非實莫非虛靈非內非外莫非內外故曰合外內之道不可以執一論故曰時措之宜時云者時中也自成自道非有所為而為之也誠者物之終始天地大物也隂陽寒暑終而始始而終皆物也山川鬼神百物之産終而始始而終皆物也人又物之最靈者君臣父子兄弟夫婦朋友終而始始而終皆物也若是者皆具形氣皆屬性命皆有終始皆物也則皆誠也不誠是無物也雖粲粲井井於吾前而我乃日用而不知則猶無物也故君子誠之為貴以此成己則謂之仁以此成物則謂之知仁知皆謂之德性何內何外故曰合內外之道事事皆性命物物皆性命在在皆性命變化云為如四時之錯行故曰時措之宜時即中庸也無偏無倚無過不及時時常中是之謂時噫此章愈可以見性命中庸之藴矣故至誠無息不息則久久則徴徴則悠遠悠遠則博厚博厚則髙明博厚所以載物也髙明所以覆物也悠久所以成物也博厚配地髙明配天悠久無疆如此者不見而章不動而變無為而成天地之道可一言而盡也其為物不二則其生物不測天地之道博也厚也髙也明也悠也久也今夫天斯昭昭之多及其無窮也日月星辰繫焉萬物覆焉今夫地一撮土之多及其廣厚載華嶽而不重振河海而不泄萬物載焉今夫山一卷石之多及其廣大草木生之禽獸居之寶藏興焉今夫水一勺之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉詩云維天之命於穆不已蓋曰天之所以為天也於乎不顯文王之德之純蓋曰文王之所以為文也純亦不已無息二字最不可不玩味惟其無息所以不息而行道者或有時乎息焉則非誠矣不息所以可久久則必有徴驗有徴驗則自然悠逺自然博厚自然髙明又言載物覆物成物即物之終始也天地物之大者也何謂配易簡之善配至德至德即易簡故也其為氣也配義與道氣即道義故也我與天地相似故亦曰配天地可指實而言也悠久而曰無疆果何物耶謂無疆為不見不聞則天地可見聞也天地雖可見聞而天之所以髙明地之所以博厚吾亦不知其所以然也又贊之曰如此則不待見而自章不待動而自變無所為而自成又贊天地之道曰其為物不二則其生物不測二則有間有間則有限有限則易窮不二則無息無息則無際無際則不測又贊之曰天地之道博也厚也髙也明也悠也久也雖曰一言可盡然纍言又不能盡也下所言天地山水乃極言無息之妙也中庸之道有顯微而無顯微也有小大而無小大也有髙下而無髙下也有逺近而無逺近也以至廣狹厚薄深淺多寡無不皆然此未有天地以前渾全之太極也故天斯昭昭之多非始小而終大也蓋所謂日月星辰繫焉萬物覆焉固自具於斯昭昭之中而指斯昭昭則覆物之無窮已在是矣地一撮土之多非始薄而終厚也蓋所謂載華嶽振河海萬物載焉固自具於一撮土之多而指一撮土則載物之廣厚舉在是矣山一卷石之多非始卑而終髙也蓋所謂草木生之禽獸居之寶藏興焉固自具於一卷石之中而指一卷石則山之廣大舉在是矣水一勺之多非始淺而終深也蓋所謂黿鼉蛟龍魚鱉生焉貨財殖焉固自具於一勺水之中而指一勺水則水之不測舉在是矣由是言之藏至大於至小而小所以為大也藏至厚於至薄而薄所以為厚也藏至髙於至卑而卑所以為髙也藏至深於至淺而淺所以為深也謂之藏而非藏也微所以為顯也隱所以為見也不睹不聞所以為睹聞也獨所以為對而一所以為十百千萬以至於無窮也此悠久無疆之義也此所以貴於不息也是故致知非真知則為徒知不知而力行則為冥行何者不真識天地山水則不識誠不識誠而漫曰吾孳孳不已焉吾恐斯昭昭撮土卷石勺水皆非真者雖窮年之力窮終身之力其所到亦非中庸之道也如能識其所謂天地山水則自能識誠既識誠則雖欲息也其可得乎而或者亦有略識其真則是斯昭昭撮土卷石勺水已有以窺之矣而立心不純用工不繼自止自畫則何以至於無窮不測廣大廣厚之極致耶然則不知而冥行與不能行其所知者皆不足言不息也皆不足言至誠也引詩維天之命於穆不已以見窮理盡性至命者惟文王足以當之文王即天也故詩人配偶而言之於嘆辭也穆美也嘆息而言美矣哉天之命乎何其亘萬古而無終已乎子思於是斷之曰天之所以為天也於乎亦嘆辭也不顯顯也文王豈不甚昭顯乎何其純乎純而無一毫之間斷乎子思於是斷之曰文王之所以為文也而又申言之曰純亦不已言文王之純即天命之不已也曷謂純曰不識不知是也學者欲識誠當玩味無息二字惟其無息所以不息道本無息而行道者或息則非誠矣不息所以可久久則必有徴驗有徴驗自然悠遠自然博厚自然髙明又言載物覆物成物即物之終始也天地物之大者也配云者猶易簡之善配至德至德即易簡也我與天地相似故亦曰配天地可指實而言也悠久而曰無疆果何物耶噫可指實而言者是可以言盡也道可以言盡乎故謂之無疆無疆之語旨哉善言誠者曰弗措也不已也無息無疆也如此而已如此則不待見而自章不待動而自變無所為而自成又贊天地之道約以一言曰其為物不二則其生物不測何謂不二太極也易之一畫也不二者二之所從生生生不窮以至於十百千萬孰得而測之何也同此物也為物者此也則生物者亦此也物者何誠是也不誠無物也以一言為未盡又纍言贊之曰天地之道博也厚也髙也明也悠也久也皆贊嘆之辭也下所言天地山水皆有及字天豈積斯昭昭而後及於無窮耶地豈積撮土而後及於廣厚耶山豈積卷石水豈積一勺而後及於廣大不測耶非然也未有天地山水以前已有此無窮已有此廣厚已有此廣大不測及夫天地定位山澤通氣固已微之顯也薄之厚也卑之髙也淺之深也萬古一日而已斯昭昭之微也日月星辰繫焉萬物覆焉至顯也然而至顯者即至微者一隙之明不謂之天可乎撮土至薄者載華嶽而不重振河海而不泄萬物載焉至厚也然而至厚者即至薄者一簣之進不謂之地可乎卷石勺水至卑淺也草木生之禽獸居之寶藏興焉黿鼉蛟龍魚鱉生焉貨財殖焉至髙深也然而至髙深者即至卑淺也一卷一勺不謂之山水可乎由是言之未有微而不顯者未有薄而不厚者未有卑而不髙者未有淺而不深者亦在乎無息而已詩述天與文王皆發嘆而言之涵咏此處令人感動中庸一書惟善讀者知之或言性而不及命知其為言命也或言命而不及性知其為言性也或不言性命而言天地萬事萬物之理知其皆性命也今此章援詩為證則兼説性命最為明􅋀曰於穆天命又曰文王之德之純天命與德性配偶言之又斷之曰純亦不已則知德性之純亦天命之不已性不離命也命不離性也渾渾乎一誠而無二也噫子思可謂深於性命矣可謂妙於論誠矣大哉聖人之道洋洋乎發育萬物峻極於天優優大哉禮儀三百威儀三千待其人而後行故曰苟不至德至道不凝焉故君子尊德性而道問學致廣大而盡精微極髙明而道中庸溫故而知新敦厚以崇禮是故居上不驕為下不倍國有道其言足以興國無道其默足以容詩曰既明且哲以保其身其此之謂與此章極力形容至誠之道也既曰大哉又曰洋洋又曰優優無非發揮此誠也萬物之生育皆天地之造化也而曰聖人之道何也範圍天地之化而不過曲成萬物而不遺不可一日而無聖人也故聖人在上則山川草木鳥獸魚鱉無一不得其所皆聖人洋洋優優之大道海涵而春育之也孔子之稱堯曰大哉堯之為君也巍巍乎唯天為大唯堯則之季札觀韶樂曰大矣如天之無不覆也大與天同故曰峻極於天天之所以覆萬物者此誠也聖人之發育萬物亦此誠也此其所以為洋洋優優也夫洋洋優優之大道尤於禮乎見之禮儀三百威儀三千經禮曲禮皆誠也皆天也非人之所為也而曰待其人而後行何也天秩有禮自我五禮有庸禮者天所秩用斯禮者人也即天也非人以私意偽為也大哉禮乎上際下蟠何往非禮古往今來何物非禮因考之室則有奧阼席則有上下車則有左右行則有隨立則有序皆禮也郊社以仁鬼神嘗禘以仁昭穆饋奠以仁死喪射鄉以仁鄉黨食饗以仁賔客皆禮也故孔子語門弟子曰吾語女禮使女以禮周流無不遍也又曰禮乎禮夫禮所以制中也是故明乎禮則所謂天命之性率性之道修道之教皆在是矣明乎禮則所謂致中和而天地位萬物育者皆在是矣何者天此禮也人此禮也即性命也即道也治已此禮也治人此禮也即修道也即教也禮之有品節中也有節而可樂即和也中和一理也三千三百之儀洋洋乎廣大無際者即天地之所以位也即萬物之所以育也天地萬物一致也中庸之書首句雖止言性命而不言禮至此則知所謂窮理盡性至于命者皆禮也學者不可不以禮觀中庸也苟不至德至道不凝焉曰道曰德名有二耳德至於是而道凝於是果有二耶天命之謂性率此則為道得此則為德德者得也實得於已萬變莫傾故謂之凝苟非實有諸已則雖曰得道未至於堅凝貞固猶未保其不失也鼎之象曰君子以正位凝命命即道也道凝則命無不凝也一元之氣生於春長於夏成於秋至冬則堅凝易曰隂始凝也元亨利貞之四德即春夏秋冬之四時故堅凝貞固於時為冬於德為貞是道也天道也性命之道也中庸之道也中庸即禮也子思論禮而及於道德正夫子所謂吾道一以貫之也自此以下多説禮學者當會通而觀之是故君子尊德性而道問學致廣大而盡精微極髙明而道中庸溫故而知新敦厚以崇禮尊德性而又曰道問學何也蓋世有抱負粹美之質而無師友磨礱之功終至於卑陋而不光明者矣是問學不明固非能尊德性者也然至於考核參訂極其詳博自以為得聖賢之學而於本有之德性未能洞徹融通則所謂問學者非真問學矣致廣大而又曰盡精微何也蓋世有規模闊大而忽略於節目纎悉之間者其弊將汗漫而不知底止是精微不盡固未足以語廣大也然至於一事一物較計微芒自以為有文理密察之功而未能先立乎其大者甚而流於支離苛細之弊則所謂精微者非真精微矣極髙明而又曰道中庸何也蓋世有識見超卓之人髙視物表而終不可以入堯舜之道者矣是不依乎中庸固未足以語髙明也然至於所志所行不出乎步武尋文之間遂自以為中庸不過如此而性命道德乃漫不加省則所謂中庸者非真中庸矣噫孰有知德性中庸本不相離者乎德性者問學之根基問學者所以發揮其德性故德性尊於此即問學由於此無二致也此中庸之教也孰有知廣大精微本不相離者乎大包宇宙而一物不遺細入毫髮而天地在內故廣大致於此即精微盡於此無二致也此中庸之教也孰有知髙明中庸本不相離者乎堯舜之道只在徐行後長精義入神只在日用常行髙明極於此即中庸由於此無二致也此中庸之教也以至溫故知新敦厚崇禮莫不皆然新故亦非有二致也新即故故即新也日月萬古如故而光輝萬古常新豈有兩日月哉彼蹈常襲故而不知神用變化者固未免滯而不通亦有脫去拘泥之病而不肯率由乎典常者又不免蕩而無法善學者始終如一緝熙光明不離乎故而日新又新此亦中庸之教也禮之於人也猶酒之有蘖也君子以厚小人以薄厚與禮實相關也有敦厚之質者必不流於浮偽之弊此其所以可學禮也若為人重厚而無禮以節文之不幾於瞽之無相歟故曰忠信禮之本也義理禮之文也無本不立無文不行此亦中庸之教也總此六句以崇禮言於後愈見夫道德性命一貫之理其歸不出乎禮也是故居上而好禮則驕盈無從而生為下而循禮則倍畔無自而作不驕不倍上下咸宜皆中庸也處有道之世則諫行言聽而足以興人之國處無道之時則危行言遜而足以自保其身引詩仲山甫明哲之語以言所以能保身者乃吾之明哲能見幾而作故也夫子曰用之則行舍之則藏又曰天下有道則見無道則隱此聖人教人以進退出處之大致也然則國無道惟有奉身而退卷而懷之耳今乃曰默足以容者何哉噫兹其所以為中庸之道也吾夫子嘗有言曰邦有道危言危行邦無道危行言孫蓋亂世危言則禍必及身曰默曰孫非中庸乎夫子又嘗自為委吏乘田矣所謂辭尊居卑辭富居貧亦惟安於義命而已若夫髙蹈丘園隱居求志如蠱之上九不事王侯髙尚其事此固將以待天下之清又有為時而出殺身成仁如比干之直諫而甘心就死此又因地位而為之中庸之道非執一者所可為也賢者可俯而就不肖者可企而及是之謂中庸大字已足以形容此道猶以為未也曰洋洋乎發育萬物峻極于天蓋言彌滿六合生育無邊此所以為大也又曰優優乎禮儀三百威儀三千蓋言曲盡變化至纎至悉者乃大之實也待其人而後行子思每提起人字使識人之所以為人者其旨深矣何謂人下所言至德凝道者是也德不至則道不凝惟實有諸已則堅凝而不變斯人也其盡人之所以為人者歟是故君子而下皆敷暢此旨尊德性而道問學德性者問學之根基問學者所以發揮其德性兩者不相離惟君子兼盡之所以貫天人之道會性命之極也致廣大而又曰盡精微何也言兩者不相離也君子知廣大中自有精微精微乃所以為廣大鳶飛魚躍言其上下察也極髙明而又曰道中庸何也亦言兩者不相離也惟君子知髙明中自有中庸中庸乃所以髙明夫婦之與知能行所以為聖人之不知不能也新與故亦不相離日月萬古如故而輝光萬古常新知新固不出乎溫故之中然徒守故常而無緝熙光明之益何新之有淡而不厭乃所以為新也厚與禮亦不相離禮之於人也猶酒之有蘖也君子以厚小人以薄非篤厚者固不能學禮然有美質而無禮以品節之不幾于野乎簡而文乃可貴也此五句皆舉兩端相對而言舉兩端則中在其中矣夫子嘗曰禮乎禮夫禮所以制中也前既言禮儀威儀此又以崇禮終之道以禮為的禮以中為的禮即中也即誠也是故居上而好禮則不驕為下而好禮則不倍處治世以禮則言足以興邦處亂世以禮則默足以保身又引詩大雅以見明哲保身之義或曰保身以緘默皆中也身也者父母之遺體求生害仁固失天則輕捐遺體亦匪中庸子曰愚而好自用賤而好自專生乎今之世反古之道如此者災及其身者也非天子不議禮不制度不考文今天下車同軌書同文行同倫雖有其位苟無其德不敢作禮樂焉雖有其德苟無其位亦不敢作禮樂焉子曰吾説夏禮把不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周王天下有三重焉其寡過矣乎上焉者雖善無徴無徴不信不信民弗從下焉者雖善不尊不尊不信不信民弗從故君子之道本諸身徴諸庶民考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑質諸鬼神而無疑知天也百世以俟聖人而不惑知人也是故君子動而世為天下道行而世為天下法言而世為天下則遠之則有望近之則不厭詩曰在彼無惡在此無射庶幾夙夜以永終譽君子未有不如此而蚤有譽於天下者也此正為小人無忌憚之中庸而發此論也世間愚賤之人所以敗於自用自專者固其資稟氣習之使然亦由見識昏暗自謂我欲行古道而世俗不識反謂我為非此見一定遂為痼疾終其身不可解嗟乎居今反古寧不可嘉然所謂古道者特未易言耳夫中庸之道古道也合天下之智以為智而不自用其智合衆人之能以為功而不自專其功所謂善世而不伐勞謙有終兹豈非中庸之道乎今以愚且賤而乃自用自專變今之俗違古之道自招災殃尚不知悔之人也正所謂反中庸者也故聖人深鄙之且夫議禮制度考文惟天子乃可為六合同風九州共貫則禮樂征伐自天子出此萬古不易之道也彼何人斯輒敢反古之道此端一啓將見天下紛紛乎不可定矣豈天無二日之謂乎孔子之作春秋所以能使亂臣賊子懼者無他惟尊王而已矣故其書法必以王冠於每嵗之首皆所以明天下之大分正萬世之綱常而消斯人僣擬之萌也雖然周室既卑矣國異政家殊俗而風雅變矣豈復能混四海為大同乎然齊桓晉文猶知尊天子以明大義而列國諸侯朝於王所者尚班班可見也中庸言文武之政布在方策子貢言文武之道未墜于地在人賢者識其大者不賢者識其小者莫不有文武之道焉蓋周室雖已衰微而制度文為粲然具在故家耆舊猶未盡泯則所謂車之同軌書之同文行之同倫至有周之季尚足以繫人心而同風俗吾夫子念念不忘周正為此也夫制禮作樂必有天子之德又有天子之位乃可為耳有德而無位有位而無德皆不敢作禮樂何則禮樂之道與性命通性命雖人之所同而能盡性立命者幾何人哉不能盡性立命則於禮樂乎何有是故有可以作禮樂之德又有可以作禮樂之位則堯舜禹湯文武周公其人也至於吾夫子雖備天下之大德而不居天下之尊位故制作不見諸行事而禮樂僅託諸空言人以為夫子之窮而在下視堯舜禹湯文武周公之逹而在上者若不同也而吾以為無不同也何也兩君相見之盛典與在畎畝之中事雖不同其為禮樂相示則一也得時得位而形於制作與有德無位而不敢作禮樂者隱顯雖殊而其道則一也蓋所謂不敢作者非置禮樂於無用也特無位以行之故不得施諸朝廷放諸四海耳若夫致禮以治躬致樂以治心何嘗斯須去身耶故繼之曰吾説夏禮把不足徴也吾學殷禮有宋存焉吾學周禮今用之吾從周他日又曰夏禮吾能言之把不足徴也殷禮吾能言之宋不足徴也文獻不足故也足則吾能徴之矣又曰周監于二代郁郁乎文哉吾從周曰吾能徵曰吾從周夫子體太一之妙洞性命之理無一念不在禮樂無一日不講禮樂衛君待子而為政子欲以正名為先其言曰名不正則言不順言不順則事不成事不成則禮樂不興陳恆弒齊君夫子沐浴而朝告於哀公請討之凡此皆興禮樂之規模也聖人固未嘗專執夫不敢作禮樂之説而坐視天下之淪胥以敗也非特如此而已從周之言雖未嘗參用夏殷之禮及其答顔淵為邦之問則又曰行夏之時乘殷之輅服周之冕樂則韶舞損益四代之禮樂亦未嘗執一焉夫道無方所無體質在在有中庸在在有禮樂故聖人之論禮樂也錯綜其辭不膠於一始而曰經禮曲禮申之曰非天子不議禮又合而言之曰不敢作禮樂又不兼言樂而專論夏殷周之禮皆所以明夫不可執一之道也王天下有三重焉諸家説三重各不同愚謂三重只當本上文之旨蓋夏殷周三王之有天下也皆以禮為重夏禮殷禮周禮上文列此三者而繼之以三重則是王天下者所重在禮固三代之所同也嗣三代而有天下者苟能明此三重之意庶幾可以寡過乎禮乎禮夫禮所以制中也惟中則不過過焉者皆非中也聖人不敢言無過而止言寡過此其謙謙不自足之心即所謂禮也上焉者雖善無徵無徴不信不信民弗從下焉者雖善不尊不尊不信不信民弗從此當子細玩味經旨上謂逹而在上者下謂窮而在下者如夏殷之禮可謂善矣然歷時既久文獻不足雖欲考證而語焉不詳人孰信之至吾夫子雖善於禮然不得尊位道不可行方且毁於叔孫圍於陳蔡歷聘諸國老死而卒不遇以是知德位不可以闕一也君子之道而下其諸有位以行其德者乎本諸身既無愧矣然驗諸民而未信是在我猶有可議也猶未契於中庸之道也徴諸庶民不過施之當今耳苟徒合乎今而未合乎古是吾之所行視三王猶有舛也猶有虧於中庸之道也然三王乃人道苟合乎人而未合乎天是吾猶未能與天地合其德猶未能與鬼神合其吉凶猶未致極乎中庸之道也夫至於建諸天地而不悖質諸鬼神而無疑可以止矣猶且曰百世以俟聖人而不惑何歟豈百世聖人之道又有出乎天地鬼神之外者歟又有妙於中庸者歟曰非然也言三王而又言天地鬼神似有天人之别也或者不察則謂三王為淺近天地鬼神為深遠歧天地人而二之於道大有害子思子遂於天地鬼神之下又申之曰百世以俟聖人而不惑則天地鬼神也聖人也何幽何明何深何淺何遠何近洞然一致何有疑惑此所謂中庸此所謂性命故曰質諸鬼神而無疑知天也言此道通天人決知天之無異乎我故謂之知天百世以俟聖人而不惑知人也言此道通古今決知聖人之無異於我故謂之知人是知也非有髙深幽微不可測度之神也不過曰中庸而已喜怒哀樂未發之中即上天之無聲無臭愚不肖之與知與能即鬼神之不可見不可聞造端乎夫婦即察乎天地能盡其性即可以贊化育昧者梏於形體之異但見天地自天地鬼神自鬼神人自人所以不能知人亦不能知天既未能知安得質諸鬼神而無疑安得百世以俟聖人而不惑惟明道之君子讀天命之謂性則知性不離命命不離性讀率性之謂道則知天不離人人不離天讀修道之謂教則知物不離已已不離物此之謂一此之謂誠此之謂中庸中庸無方所無體質事事有中庸物物有中庸在在有中庸所謂知天者以此而知也所謂知人者以此而知也夫惟中庸之道愈久而愈無弊如其有一毫之偏則目前雖未遽見其害久久未有不弊者動而世為天下道行而世為天下法言而世為天下則看三箇世字見得世世可以常行非若一偏一曲之小道僅為一時之可觀而已大凡言動有毫釐未盡善處則不可以為世之法則古人雖是小莭亦無往不致謹道無大小無衆寡皆不可慢稍有不謹即招悔尤衆所觀瞻豈容掩覆吾非欲為人之觀瞻而後謹也亦非欲為人之法則而後謹也道自不容不謹也是故惟明於至誠謹獨之學者然後其言動可為世法後世賢者或負其髙明之資以為小莭不必拘泥是以言行之間不耐檢點殊不知一動不謹一言不應人皆得以議其後况望其為世道為世法為世則豈可得哉嗚呼盍亦反求其所謂知天知人者乎如果能質諸鬼神而無疑百世以俟聖人而不惑則天人之道盡備於我言行之間安有玷闕惟其未明夫中庸天人之道所以托實者皆泥紙上之陳言談妙者昧經世之實用各墮一偏而未底厥中宜乎言而易失行而易弊不足以望古人之純全也子思子探其本於知天知人而後繼之以言行法則之論厥有旨哉遠之則有望近之則不厭此語尤更警省學者夫逺難乎其有望也非真如玉之在山珠之在淵安能有望近難乎其不厭也非真如桑麻之可衣穀粟之可食安能不厭詩言令聞令望又言萬民所望大几人有素望者雖不待發見於容貌聲氣之間而已足以感人動物雖不朝夕與之薰染親炙而四方萬里同心向慕有不期然而然者此所謂逺之則有望也子問公叔文子於使者使者對曰夫子時然後言人不厭其言樂然後笑人不厭其笑義然後取人不厭其取夫子有疑焉蓋謂近之不厭非有盛德者不能爾而公叔文子則固未足以進此也引詩在彼無惡在此無射庶幾夙夜以永終譽而子思復發明蚤有譽之辭學者讀到此皆疑君子不當有求名之心加一蚤字則又似有汲汲惟恐少緩之意毋乃啓人要譽之念乎曰不然此正所謂君子之道本諸身徴諸庶民者也若不觀諸徴驗何以見吾之實德今人每謂人之毁譽何足恤殊不知古人用心小人怨汝詈汝則皇自敬德沒世而名不稱則君子以為深疾易曰觀我生進退象曰觀我生觀民也苦不自知不觀諸民則何以為吾之徴驗也故丁寧其辭曰君子未有不如此而蚤有譽於天下者也言不如上之所言而能蚤有譽者萬萬無之其欲人之猛自省悟如此此中庸至緊至􅋀之教也愚賤之人自用自專冒焉變今之俗還古之道自取禍災必矣議禮制度考文天子事也而豈愚賤者可為耶今指當時也周室雖衰典禮未墜所謂車之同軌書之同文行之同倫尚足以繫人心而一風俗有如制禮作樂必德位兼全乃可為耳吾夫子有德而無位雖不敢作禮樂而未嘗不學也夏禮不可考證殷禮雖存而不用惟周禮乃時王之制吾嘗學之矣所從者周而已矣三重者謂夏殷周皆以禮為重也明此三重之義以禮制中其可以寡過矣乎上謂逹而在上者下謂窮而在下者如夏殷之禮雖善然無所考證如孔子雖善於禮然不在尊位則皆無以使人之信從正以德位不可闕一故也君子之道以下其諸有位以行其德者乎言時王也繼周而王者亦是也本諸身固無愧矣又當以庶民為徴驗民苟弗信猶未也民信矣宜於今不合於古猶未也三王人道也合乎人不契乎天猶未也至於建天地質鬼神可以止矣猶曰俟聖人何歟豈聖人又有妙於是者歟非然也於天地鬼神之下復申言聖人者正所以貫天人於一致也又繼之曰質諸鬼神而無疑知天也言此道通天人決知天之無異乎我故謂之知天百世以俟聖人而不惑知人也言此道通古今決知聖人之無異乎我故謂之知人所知何知也喜怒哀樂未發之中即上天之無聲無臭不睹不聞之獨即鬼神之不可見不可聞知天者以此知人者亦以此知無所知故無不知使其有知則不能知因言百世不惑又接世字以申明可傳可繼之義動為世道行為世法言為世則遠而為人所仰望近而不為人所厭射引詩振鷺之章以明不如此而能蚤有名譽者未之有也噫君子豈有求名之心哉名亦性命中當然之理耳仲尼祖述堯舜憲章文武上律天時下襲水土辟如天地之無不持載無不覆幬辟如四時之錯行如日月之代明萬物並育而不相害道並行而不相悖小德川流大德敷化此天地之所以為大也夫子天縱之聖即是堯舜何必祖述即是文武何必憲章然聖人之心未嘗見已之為聖若見已之為聖即非聖人聖人謙謙然常自以為不足一則曰我非生而知之好古敏以求之二則曰若聖與仁則吾豈敢抑為之不厭云云以此知大聖人未嘗不好學未嘗不以古人為法堯舜之稽古文武之繼述皆此道也而謂夫子獨不然乎上律天時下襲水土律法也襲因也堯舜文武之道不出中庸天時地理不越中庸中庸即隂陽也即性命也即誠也即一也天時水土能外陰陽性命乎能外誠一乎從天命之謂性一句若真是透徹則仲尼一章不待句句解説自有渙然氷釋怡然理順者矣學者但當看律字襲字聖人未嘗有一毫私意無非順天地之自然所以能如天地之無不持載無不覆幬若有一毫私意豈能與天地相似如四時之錯行如日月之代明若有一毫私意豈能與四時日月相似錯行代明不可不玩味四時日月一隂陽也隂陽一中庸也人第見日昱乎晝月昱乎夜晝夜往來不窮而不知中庸則一也人第見春作夏長秋斂冬藏相更相禪以成歲功而不知中庸求之不見其始窮之不見其終往而復復而往新而故故而新只此便是中庸何必别求所謂中庸若於錯行代明之外更求中庸之妙則大誤矣喜怒哀樂未發只在錯行代明中及其發也亦只在錯行代明中溥博淵泉而時出之只在錯行代明中博厚髙明悠久無疆亦只在錯行代明中非特此也愚夫愚婦之所與知與能只在錯行代明中聖人之所不能知不能行亦只在錯行代明中宜爾室家樂爾妻帑只在錯行代明中位天地育萬物為天下國家有九經至誠之道可以前知亦只在錯行代明中故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義上下四方往古來今千變萬化不出乎陰陽剛柔仁義之外且夫陰與陽若相反剛與柔若相反仁與義若相反然而實未嘗相反也太極未判渾然至一太極既判不可相無陽而無隂可乎剛而無柔可乎仁而無義可乎惟其不可相無也故有陽中之隂隂中之陽剛中之柔柔中之剛仁中之義義中之仁其代明也其錯行也所謂四時五行十二月還相為本也五聲六律十二管還相為宫也五色六章十二衣還相為質也五味六和十二食還相為質也此所以生生而不窮此所以萬物並育而不相害道並行而不相悖也人有五官配五行食五味别五聲被五色而隂陽剛柔仁義具乎中而又有聖人者焉出類拔萃備道全美肅乂哲謀聖之德上應雨暘燠寒風之時肅焉而時雨順之乂焉而時暘順之哲焉而時燠順之謀焉而時寒順之聖焉而時風順之其謂之時也正所謂代明錯行周流不窮各當其節而不相陵犯之謂也孟子論伯夷伊尹栁下惠各得清和任之一偏而皆不及吾夫子之集大成吾夫子之所以集大成者惟其時而已可仕則仕可止則止可久則久可速則速安行乎時義之當然而意必固我一毫不立此所以始終條理金聲玉振卓乎為羣聖人之冠者只是時之一字耳其謂之時也即所謂中也聖人備隂陽剛柔仁義之全上配四時五行以為五典五禮之宗主五者何也中也五服五章五刑五用皆五也即中也鄉遂之制自五家為比始軍師之制自五人為伍始皆五也即中也即九疇之居中也即八卦之虛中也河圖洛書八卦九章即所謂並育不相害並行不相悖也即所謂四時錯行日月代明也即所謂天命之謂性也性命之理固不在隂陽剛柔仁義之外也小德川流大德敦化德本無大小之别然未嘗無大小之名或小或大何往非德川流敦化正所以見德之渾融周遍無乎不貫與錯行代明並育並行固一義也熟味此兩句反而觀夫斯昭昭一章可以油然自得也矣斯昭昭一撮土一卷石一勺水正所謂小德川流及其無窮及其廣厚及其廣大及其不測正所謂大德敦化其流也一息不停其化也萬古不變一息不停者亦萬古不變萬古不變者亦一息不停何小何大渾乎一貫敦化二字不可不玩味坤厚載物乾健不息備乾坤之德故謂之敦化故能生生不窮子思子斷之曰此天地之所以為大也此章全是稱頌孔子合云此孔子之所以為大乃曰天地之所以為大何也嗚呼天地非孔子乎孔子非天地乎是可以加一毫之擬議乎夫子即堯舜也何待祖述即文武也何待憲章於此見敏求不厭之心焉律法也襲因也天時有生地理有宜法之因之而已何識知哉物有彼此則有區别有區别則有取舍惟夫子則猶天地之涵育萬物無有彼此何物不持載何物不覆幬物相錯則易差相代則易亂惟夫子則如四時日月錯行代明何終何始物之生也並則爭爭則害道之行也並則敵敵則悖惟夫子則融貫變通並育並行無適不可德本無大小之名然亦未嘗無小大之别小德則川流大德則敦化其流也一息不停其化也萬古不變萬古不變者亦一息不停一息不停者亦萬古不變此章專頌夫子合云此孔子之大乃曰天地之所以為大何也噫天地非孔子乎孔子非天地乎唯天下至聖為能聰明睿知足以有臨也寬裕溫柔足以有容也發強剛毅足以有執也齊莊中正足以有敬也文理密察足以有别也溥博淵泉而時出之溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説是以聲名洋溢乎中國施及蠻貊舟車所至人力所通天之所覆地之所載日月所照霜露所隊凡有血氣者莫不尊親故曰配天此反覆贊詠聖人與天地為一處自古聖人者首曰聰明亦曰智勇亦曰睿聖臨蒞天下非聰明睿知則何以照燭萬微鼓舞羣動此所謂生知天縱之資非可以學而能也故謂之至聖腦頭上將一聖字貫下面數句所謂有容有執有敬有别皆從聖字來寬裕溫柔發強剛毅齊莊中正文理密察十六字如何兼得而聖人乃備於一身聖人非於用柔之時曰吾不可不寬裕溫柔也於用剛之時曰吾不可不發強剛毅也以至齊莊中正文理密察皆自然中節非有意為之若使一毫有意即不是中庸即不是聖人聖人所以不可及者如一元之氣運行周流春自然和夏自然暑秋自然涼冬自然寒正所謂錯行代明正所謂並育並行聖人之盛德惟一時字可以形容故孟子曰孔子聖之時者也然所謂時者豈有意為之哉天無意聖人亦無意其容也自然并包其執也自然不動其敬也自然安安其别也自然井井是四者循環無端不可窺測聖德至大故謂之溥博聖德至深故謂之淵泉聖德無所往而不在故謂之時出之此所謂聖之時也此所謂中庸之妙也學者不善讀書但見齊莊中正有一中字不知讀聖經者當領會言外之意事事皆有中微有間斷則何緣能溥博淵泉而時出之不至於聖之時則何緣有臨矣而又有容有容矣而又有執有執矣而又有敬有敬矣而又有别源源乎如是其不窮耶易所謂窮神知化孟子所謂大而化之此聖人之時也此中庸之至也又申言之曰溥博如天淵泉如淵見而民莫不敬言而民莫不信行而民莫不説可謂塞天地而橫四海綏斯來而動斯和矣非聖乎非中庸之至德乎猶以為未也又言聲名之洋溢在中國者未足為至行蠻貊者乃可為至舟車人力之所及天覆地載之所容日月霜露之所被有知無知有情無情几囿形於宇宙之內而有血氣心知之性者其尊之親之若出一人上配皇天無有限極嗚呼斯其所以為聖乎斯其所以為中庸之至德乎斯其為窮理盡性以至命乎雖然前章言不見而章不動而變無為而成此乃言見而民莫不敬言而民莫不信行而民莫不悅毋乃有淺深之間耶前章不言仲尼之所以為大徑言此天地之所以為大毋乃天與聖人猶為二故可以作配言耶此學者之所以不能無疑也嗚呼本無可疑何庸致疑見即不見不見即見動即不動不動即動無為即行行即無為一也此所以民莫不敬莫不信莫不悅亦一也惟其一也故作配由是觀之不可以有隱見動靜作止言也亦不可以無隱見動靜作止言也故吾於中庸之首即曰天命之謂性性不離命命不離性性命一也率性之謂道天不離人人不離天天人一也修道之謂教已不離物物不離已物我一也莫見乎隱莫顯乎微隱顯一也鳶飛戾天魚躍于淵上下一也視之而不見聽之而不聞體物而不可遺人鬼一也此一即誠也即太極也即太一也即中庸也聖無不通也加至字則無不通也至矣然不過盡性而已盡性則五者之德自然兼備有臨有容有執有敬有别一性盡則五者俱有性不盡則焉能為有所謂不誠無物也是五者至周遍至深廣隨用隨出故曰溥博淵泉而時出之時者何中也天命之性也又贊美之曰如天如淵而民莫不敬信且服是宜聲名四逹覆載之內合敬同愛上配皇天無有限極吁斯其為窮理盡性至命之聖乎唯天下至誠為能經綸天下之大經立天下之大本知天地之化育夫焉有所倚肫肫其仁淵淵其淵浩浩其天苟不固聰明聖知逹天德者其孰能知之經常也即庸也立天下之大本大本即中也知天地之化育夫焉有所倚位天地育萬物皆中庸也肫肫其仁肫肫純也淵淵其淵淵淵深也浩浩其天浩浩廣大也嗚呼至矣哉或者謂到此地位聖人即天地天地即聖人曰經綸天下之大經立天下之大本可也而乃曰知天地之化育夫既與天地為一如何著得知字殊不知乾知大始乾可以言知而聖人獨不可以言知乎此所謂知者豈知見之謂乎詩之美文王曰不識不知孔子曰無知也是故逹無知之妙者始可與語知矣始可與語不倚矣始可與語誠矣此之至誠即前章之至聖此之夫焉有所倚即前章之溥博淵泉而時出之此之其淵其天即前章之如天如淵如天如淵猶可以如言其淵其天則不可以如言矣噫不可以如言與可以如言者果為二乎果可以優劣言乎子思子曰自誠明謂之性自明誠謂之教曰其曰如之謂也子思子又曰誠則明矣明則誠矣如即其其即如之謂也此皆中庸之妙也又斷之曰苟不固聰明聖知逹天德者其孰能知之天下之至聖即天下之至誠曰誠曰聖皆天德也皆中庸之妙也謂之如天如淵可也謂之其天其淵亦可也學者患不明中庸耳果明中庸將昭如日月而又何以擬議為乎上言至聖此言至誠一也大經者五典之常道經綸者若治絲然有條理而不亂也此常道根本乎天性此常道化生乎萬物本立而道生也立猶修身道立之立知猶乾知大始之知非至誠不能立不能知然此常道亦不過曰中而已故繼之曰夫焉有所倚聖人經世非遺世日用常行何倚著之有子思極力發明中庸二字當於此處細玩以愈見夫誠即中庸中庸即天命之性肫肫淵淵浩浩皆贊嘆之辭以言純乎深乎廣大乎何可以形容盡也此章其淵其天即前章如淵如天如淵如天猶可以如言其淵其天則不可以如言矣不可以如言者一也固云者固有也非固有聰明聖知逹天德者不足以知此詩曰衣錦尚絅惡其文之著也故君子之道暗然而日章小人之道的然而日亡君子之道淡而不厭簡而文溫而理知遠之近知風之自知微之顯可與入德矣詩云潛雖伏矣亦孔之昭故君子內省不疚無惡於志君子之所不可及者其唯人之所不見乎詩云相在爾室尚不愧于屋漏故君子不動而敬不言而信詩曰奏假無言時靡有爭是故君子不賞而民勸不怒而民威於鈇鉞詩曰不顯惟德百辟其刑之是故君子篤恭而天下平詩云豫懷明德不大聲以色子曰聲色之於以化民末也詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣上面纍章贊詠聰明聖知之德其言可謂至矣盡矣無以復加矣然學者須知中庸只是日用常行初非幽深髙遠堯光被四表格于上下只是允恭克讓舜在側微玄德升聞只是溫恭允塞夫子天縱將聖如天之不可階而升只是學不厭教不倦大凡聲光之在外者雖極其烜赫然聖人之所以為聖人者德盛而志愈謙道大而心愈小聖人非有意為之也道本無可矜衒人自矜衒耳不矜衒者藏而自顯久而愈章好矜衒者暫焉雖著隨即泯滅矣聖人以此為君子小人之判蓋為己之學何必汲汲於求人之知苟先萌求知之心即非為己之學暗然而日章者退後一步光焰萬丈的然而日亡者溝澮之水涸可立待然則學者當何擇哉子思子欲發明衣錦尚絅暗然日章之道於是又接續言之君子之道淡而不厭簡而文溫而理大凡冷淡者易得厭斁惟君子雖淡而不厭簡直者文采易不足惟君子雖簡而甚文溫醇者未必就條理惟君子雖溫而又能井井不亂此即是中庸之道也大羮元酒清廟之瑟遺音遺味誰其厭之乾以易知坤以簡能有親有功文莫過此溫潤縝栗比德於玉玉振條理聖之事也此非深造中庸之至德何以至此夫子大聖猶且發憤忘食不知老之將至者正以此道無窮而至誠無息故也學者用力於道只在溫簡冷淡中即所謂尚絅也所謂暗然也其理也其文也其不厭也非錦乎非日章乎然此道須在致知上知得透徹乃可以入德故曰知遠之近知風之自知微之顯可以入德矣三箇知字不可不玩味遠即近也微即顯也風之自易曰風自火出家人君子以言有物而行有恆化型一家風也言行在我自也一國之風天下之風未有不自言行始勿求於風知自即知風矣勿求於遠知近即知遠矣勿求於微知顯即知微矣凡人常欲知遠而未嘗知逺之近常欲知風而未嘗知風之自常欲知微而未嘗知微之顯故馳騖乎四方萬里之外而几席之下反有所不察探索乎茫昧深幽之域而日用之間反有所不辨此不足以語知矣所貴乎知者心如太空六通四闢舉目所見皆道也盈耳所聞皆道也致知如此則必不固滯必不疑惑而可以入德矣如其膠轕乎事物之中眩耀於聲色之末而本心之靈障蔽湮塞去德不亦遠乎子思子極力發揮所謂衣錦尚絅暗然日章之道至此尤更分明故引詩曰潛雖伏矣亦孔之昭故君子內省不疚無惡於志所謂無惡於志者猶言無愧於心也又繼之曰君子之所不可及者其唯人之所不見乎詩曰相在爾室尚不愧于屋漏此即無惡於志之謂也此書首言謹獨末亦言謹獨然中間所言者非謹獨乎曰所謂謹獨者莫見乎隱莫顯乎微之義也子思之論鬼神之德亦曰微之顯誠之不可掩如此夫中庸一書專是言誠誠即謹獨之謂也非于性命中庸之外别有所謂誠也中庸即誠也性命即誠也誠者不息不已之謂也故曰至誠無息又曰維天之命於穆不已文王之德之純純亦不已苟有隱見顯微之間則息矣已矣不純矣不誠矣非中庸矣非性命矣君子所貴乎謹獨者以其無獨不獨之間也無獨不獨之間者以其無顯微隱見之間也無顯微隱見之間者以其本無息也本無已也本中庸也本天命之謂性也故屋漏暗室之中大賓大客之前無獨不獨之間也閨門婦子之際宗廟朝廷之上無獨不獨之間也鳶飛戾天魚躍于淵無獨不獨之間也愚夫愚婦之所與知與能聖人之所不知不能無獨不獨之間也斯昭昭一撮土一卷石一勺水及其無窮及其廣厚及其廣大及其不測無獨不獨之間也無獨不獨之間則一毫非少邱山非多也目前非近千歲非遠也人事非著鬼神非幽也富貴非亨貧賤非困也平靜非泰患難非否也中國非安夷狄非危也我非此物非彼也陽非闢隂非闔也隂陽無獨無不獨也彼我無獨無不獨也獨必有不獨微必有顯也隱必有見也不睹必有睹也不聞必有聞也可畏哉可懼哉噫通乎此者可語謹獨矣經綸天下之大經立天下之大本知天地之化育皆謹獨也有臨有容有執有敬有别皆謹獨也世之論者以謹獨為學者之事非聖人之事夫聖人學者則固有間矣然謹獨雖聖人不廢也若謂至聖至誠無事乎謹獨生知安行無事乎謹獨則堯舜不必兢業禹不必勤儉湯不必危懼文王不必小心武王不必祗懼周公不必坐以待旦孔子不必不厭不倦矣説者之言特未深逹乎所謂獨者如何耳獨即伏羲所畫之一也此一未有天地之前固有之也即太極也即太一也即太始也即喜怒哀樂未發之中也即天命之謂性也謹者謹此也外此無他道也此中庸一篇之宗旨縱説橫説不外此也語大語小不外此也一即百千萬億算計之所不可窮者也百千萬億算計之不可窮者即一也然則中庸之書首言謹獨末亦言謹獨中間所言無非謹獨讀聖人之書苟非此心虛明洞逹迎刃而解乃欲於繚繞牽制中求義理之趣亦惑矣是故君子不動而敬不言而信敬固自敬而人之敬己亦一也不待動而後敬其止也無非敬也不待言而後信其默也亦無非信也道固無動靜語默之間也詩曰奏假無言時靡有爭然則道豈在多言哉是故君子不賞而民勸不怒而民威於鈇鉞然則道豈在賞罰之末哉非無言也言本無言也本無言則雖終日言可也非無賞罰也賞罰本非賞罰也本非賞罰則曰賞曰罰皆德也故引詩曰不顯維德百辟其刑之是故君子篤恭而天下平夫子之稱舜曰夫何為哉恭已正南面而已矣夫不言不動而自足以感人動物是果何為而然於此亦可以悟矣又引詩曰豫懷明德不大聲以色子曰聲色之於以化民末也皆所以發明不言不動之旨也詩曰德輶如毛毛猶有倫上天之載無聲無臭至矣説者曰中庸首言天命之謂性末言上天之載無聲無臭以此為始末相貫嗚呼中庸之書無一言而非性命也無一言而非無聲無臭也性命豈微歟聲臭果無歟性命微則事物為顯歟無聲無臭為妙則有聲臭非妙歟噫孰知中庸之書無一言非性命也而亦無一言非有聲有臭也道不可以微顯論也皆微也皆顯也皆非微顯也道不可以有無論也皆有也皆無也皆非有無也毛猶有倫而不可損也無聲無臭而不可增也至矣之妙非可以言語盡也此所以謂一也此所謂誠也此所謂性命也此所謂中庸也故曰窮理盡性以至於命道無可矜衒者久而愈章好矜衒者暫焉雖著隨即澌盡矣淡中有不厭之味簡中有可觀之文溫厚中有井井秩秩之條理此所為尚絅也所謂暗然而日章也知逺之在近知風之有自知微之可顯以此為入德之要則不必表暴於外潛雖伏矣亦孔之昭盍亦內省乎省己而無疚病也斯可以無愧於心矣勿謂人不我見也人尚可欺吾心不可欺也然則君子之所不可及者其惟為善於人之所不見乎不愧屋漏何待言動而民敬信時靡有爭何待賞罰而民勸懲有不顯之德則篤恭而天下平矣何待聲色而民化服大聲色而人化服者末也泯聲色而人化服者德也此德豈舉之莫能勝哉一毛之輕耳雖然毛尚有倫迹也聲臭俱無則至矣無聲臭而曰天之載載事也事曷嘗離道道曷嘗離事歟道不可以微顯論也皆微皆顯皆非微顯道不可以有無論也皆有皆無皆非有無毛猶有倫而不可損也無聲無臭而不可增也至矣之妙非可以言語盡也通一篇而觀之子思子首論天命之性率性之道教人以由道復性則指示未發之中中節之和而􅋀已工夫則在乎謹獨於是援夫子之言君子小人之中庸智愚賢不肖之過不及舜顔子子路之言行素隱聖者之出處其發明可謂至到矣費隱而下論造端乎夫婦子事父臣事君弟事兄先施朋友君子反身宜室家樂妻帑順事父母孝享鬼神無非人倫始終之道復證以舜文式周公之事推及於天子諸侯大夫士庶人喪祭之禮郊社宗廟禘嘗之義而蔽之一言曰孝者非他也即天命之謂性也哀公問政而下論修身事親知人知天之道五典三德之不同而所以行之者一生知學知困知不同而及其知之則一安行利行勉行之不同而及其成功則一為天下國家有九經而所以行之者一一者非他也即天命之謂性也事豫則立而下論明善誠身之學於是極言誠者天之道誠之者人之道誠明謂之性明誠謂之教至誠者極天地化育之妙致曲者有形著明動變化之序可以前知者誠也成己成物者誠也髙明博厚悠久皆誠也三千三百之禮待其人而後行者誠也無德無位不敢作禮樂者亦誠也建天地質鬼神百世以俟聖人者皆誠也以夫子天地配偶言之極天下之至聖即所以為天下之至誠誠者非他即天命之謂性也衣錦尚絅而下重述篇首謹獨之義有言有動未為至也不言不動至矣有賞有罰未為至也不賞不罰至矣有聲有色未為至也無聲無臭至矣此太極也易之一畫也一所以為十百千萬也不賞不罰不言不動無聲無臭所以為賞罰言動聲臭也微所以為顯隱所以為見不覩不聞所以為覩聞不可不戒謹也不可不恐懼也戒謹恐懼所以守中庸之道而復性命之正也吾固謂是書之作無一語非中庸無一語非性命而􅋀己工夫則不過曰謹獨而已矣
